<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reviews</title>
<meta name="description" content="See what our customers are saying." />
<link rel="preconnect" href="https://qgbjiqdwzgkjkmqyjsmc.supabase.co" crossorigin>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%2305070f'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='30'%3E%E2%AD%90%3C/text%3E%3C/svg%3E" />
<style>
  :root{--text:#eef1ff;--muted:#96a0c4;--line:rgba(150,190,255,.22);--acc:#5df2e0;--acc2:#6f9dff;--gold:#f5c04a;--bg:#04050a}
  *{box-sizing:border-box}
  @keyframes drift{0%{background-position:0 0}100%{background-position:60px 60px}}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  body{margin:0;font-family:Inter,system-ui,"Segoe UI",Arial,sans-serif;color:var(--text);line-height:1.6;min-height:100vh;
    background:radial-gradient(circle at 18% -8%,color-mix(in srgb,var(--acc) 12%,transparent),transparent 44%),radial-gradient(circle at 90% 6%,rgba(111,157,255,.12),transparent 42%),linear-gradient(180deg,#070a12,var(--bg))}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.5;background-image:linear-gradient(rgba(122,162,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(122,162,255,.04) 1px,transparent 1px);background-size:60px 60px;animation:drift 18s linear infinite}
  .wrap{max-width:1000px;margin:0 auto;padding:40px 18px 70px;position:relative;z-index:1}
  .head{text-align:center;margin-bottom:30px}
  .kick{font-size:12px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
  h1{font-size:clamp(28px,5vw,42px);margin:0 0 14px;letter-spacing:-.01em}
  h1 span{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .rating{display:inline-flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;padding:10px 20px}
  .rating .big{font-size:30px;font-weight:900;color:var(--gold)}
  .rating .st{color:var(--gold);font-size:18px;letter-spacing:2px}
  .rating .ct{color:var(--muted);font-size:14px}
  .grid{columns:3 300px;column-gap:16px;margin-top:30px}
  @media(max-width:640px){.grid{columns:1}}
  .rev{break-inside:avoid;background:linear-gradient(150deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:16px;animation:rise .5s ease both}
  .rev .stars{color:var(--gold);font-size:15px;letter-spacing:2px;margin-bottom:8px}
  .rev p{margin:0 0 14px;font-size:15px}
  .rev .who{display:flex;align-items:center;gap:10px}
  .rev .av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#05060d;background:linear-gradient(135deg,var(--acc),var(--acc2))}
  .rev .who b{font-size:14px}
  .rev .who span{font-size:12px;color:var(--muted);display:block}
  .cta{text-align:center;margin-top:30px}
  .btn{display:inline-block;border:0;border-radius:999px;padding:15px 28px;font:inherit;font-weight:800;font-size:15px;text-decoration:none;color:#05060d;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 10px 30px rgba(93,242,224,.3)}
  .foot{text-align:center;color:#5e6584;font-size:12px;margin-top:34px}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .hide{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kick">★ Customer Reviews</div>
    <h1>What people say about <span id="bizName">us</span></h1>
    <div class="rating hide" id="ratingBox">
      <span class="big" id="avg">5.0</span>
      <div><div class="st" id="avgStars">★★★★★</div><div class="ct" id="count">reviews</div></div>
    </div>
  </div>
  <div class="grid" id="grid"><div class="empty">Loading reviews…</div></div>
  <div class="cta hide" id="cta"><a class="btn" id="reviewBtn">⭐ Leave your own review</a></div>
  <div class="foot">Reviews powered by <a href="https://tbsol.net/loyalty/" style="color:var(--acc);text-decoration:none">Loop</a></div>
</div>
<script>
(function(){
  "use strict";
  var SUPA='https://qgbjiqdwzgkjkmqyjsmc.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmppcWR3emdramttcXlqc21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzc1NTEsImV4cCI6MjA5OTk1MzU1MX0.Naocw-B0B6Z7CLg197yxLezd58a6f5XoMLEiea5b0Ro';
  function el(id){return document.getElementById(id);}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function stars(n){ n=Math.round(n||5); return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n); }
  var q=new URLSearchParams(location.search);
  var slug=(q.get('c')||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  var hex=/^[0-9a-fA-F]{6}$/, r=document.documentElement.style;
  if(hex.test(q.get('ac')||'')) r.setProperty('--acc','#'+q.get('ac'));
  if(hex.test(q.get('ac2')||'')) r.setProperty('--acc2','#'+q.get('ac2'));

  if(!slug){ el('grid').innerHTML='<div class="empty">Add ?c=yourshop to see reviews.</div>'; return; }
  el('reviewBtn').href='/review/?c='+encodeURIComponent(slug);
  el('cta').classList.remove('hide');

  fetch(SUPA+'/rest/v1/rpc/get_reviews_public',{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify({p_client:slug})})
  .then(function(x){return x.json();}).then(function(d){
    if(!d){ el('grid').innerHTML='<div class="empty">Could not load reviews.</div>'; return; }
    var name=esc(d.biz_name||'us'); el('bizName').textContent=name; document.title=(d.biz_name||'')+' — Reviews';
    var revs=d.reviews||[];
    if(d.count>0){ el('avg').textContent=(d.avg||5).toFixed ? Number(d.avg).toFixed(1) : d.avg; el('avgStars').textContent=stars(d.avg); el('count').textContent=d.count+' review'+(d.count===1?'':'s'); el('ratingBox').classList.remove('hide'); }
    if(!revs.length){ el('grid').innerHTML='<div class="empty">No reviews yet — be the first! ⭐</div>'; return; }
    el('grid').innerHTML=revs.map(function(rv,i){
      var nm=esc(rv.name||'A customer'), init=(String(rv.name||'?').trim().charAt(0)||'?').toUpperCase();
      var dt=rv.created_at? new Date(rv.created_at).toLocaleDateString(undefined,{month:'short',year:'numeric'}) : '';
      return '<div class="rev" style="animation-delay:'+(i*0.03)+'s"><div class="stars">'+stars(rv.rating)+'</div>'
        +'<p>"'+esc(rv.text)+'"</p>'
        +'<div class="who"><div class="av">'+esc(init)+'</div><div><b>'+nm+'</b><span>'+dt+'</span></div></div></div>';
    }).join('');
  }).catch(function(){ el('grid').innerHTML='<div class="empty">Could not load reviews.</div>'; });
})();
</script>
</body>
</html>
