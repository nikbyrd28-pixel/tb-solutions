<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#05060d" />
<title>Perfect Fade</title>
<link rel="preconnect" href="https://qgbjiqdwzgkjkmqyjsmc.supabase.co" crossorigin>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%2305060d'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-size='30'%3E%F0%9F%92%88%3C/text%3E%3C/svg%3E" />
<style>
  :root{--acc:#5df2e0;--acc2:#6f9dff;--vio:#b98bff;--gold:#ffd34d}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#05060d;font-family:Inter,system-ui,"Segoe UI",Arial,sans-serif;color:#eef1ff;user-select:none;touch-action:manipulation}
  #c{display:block;width:100vw;height:100dvh}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:5;
    background:radial-gradient(circle at 50% 30%,rgba(93,242,224,.14),transparent 55%),rgba(5,6,13,.82);backdrop-filter:blur(4px)}
  .overlay.hide{display:none}
  h1{font-size:clamp(34px,10vw,60px);margin:0 0 6px;letter-spacing:-.02em;font-weight:900;
    background:linear-gradient(90deg,var(--acc),var(--acc2),var(--vio));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px rgba(93,242,224,.25)}
  .emoji{font-size:52px;margin:0 auto 4px;filter:drop-shadow(0 0 18px rgba(93,242,224,.4))}
  .sub{color:#aeb6d6;font-size:16px;margin:0 0 22px;max-width:340px}
  .row{display:flex;gap:22px;justify-content:center;margin:10px 0 4px}
  .stat b{display:block;font-size:30px;font-weight:900;color:var(--acc)}
  .stat span{font-size:12px;color:#8f97b8;letter-spacing:.06em;text-transform:uppercase}
  .btn{border:0;border-radius:999px;padding:16px 30px;font:inherit;font-weight:900;font-size:17px;cursor:pointer;color:#05060d;
    background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 10px 30px rgba(93,242,224,.35);margin-top:14px}
  .btn.ghost{background:transparent;border:1px solid rgba(150,190,255,.4);color:#eef1ff;box-shadow:none;font-size:14px;padding:12px 22px}
  .coinsWon{color:var(--gold);font-weight:800;margin-top:12px;font-size:16px}
  .lb{margin-top:16px;width:min(340px,90vw);text-align:left}
  .lb h3{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8f97b8;margin:0 0 8px;text-align:center}
  .lb .r{display:flex;justify-content:space-between;font-size:14px;padding:5px 10px;border-radius:8px}
  .lb .r:nth-child(odd){background:rgba(255,255,255,.04)}
  .lb .r b{color:var(--acc)}
  .hint{color:#6f77a0;font-size:13px;margin-top:16px}
  .tiptap{position:fixed;left:0;right:0;top:22%;text-align:center;color:#eef1ff;font-weight:800;font-size:16px;opacity:.9;z-index:4;pointer-events:none;animation:bob 1.1s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="overlay" id="startScreen">
  <div class="emoji">💈</div>
  <h1>PERFECT FADE</h1>
  <p class="sub">Tap to drop each layer. Line it up clean — miss the edge and it gets trimmed. Stack the tallest fade you can. ✂️</p>
  <button class="btn" id="startBtn">▶ Start stacking</button>
  <p class="hint" id="bestHint"></p>
</div>

<div class="overlay hide" id="overScreen">
  <h1 style="font-size:clamp(28px,8vw,46px)">CLEAN CUT ✂️</h1>
  <div class="row">
    <div class="stat"><b id="ovScore">0</b><span>layers</span></div>
    <div class="stat"><b id="ovPerfect">0</b><span>perfects</span></div>
    <div class="stat"><b id="ovBest">0</b><span>best</span></div>
  </div>
  <div class="coinsWon hide" id="coinsWon"></div>
  <button class="btn" id="retryBtn">↻ Fade again</button>
  <div class="lb hide" id="lbBox"><h3>🏆 Cleanest fades</h3><div id="lbRows"></div></div>
  <a class="btn ghost" id="backBtn" href="#" style="text-decoration:none;margin-top:12px">← Back to my card</a>
</div>

<script>
(function(){
  "use strict";
  var SUPA='https://qgbjiqdwzgkjkmqyjsmc.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmppcWR3emdramttcXlqc21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzc1NTEsImV4cCI6MjA5OTk1MzU1MX0.Naocw-B0B6Z7CLg197yxLezd58a6f5XoMLEiea5b0Ro';
  var q=new URLSearchParams(location.search);
  var client=(q.get('c')||'demo').toLowerCase().replace(/[^a-z0-9]/g,'')||'demo';
  var code=(q.get('m')||'').slice(0,40);
  function rpc(fn,args){ return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(args)}).then(function(r){return r.json();}); }
  var el=function(id){return document.getElementById(id);};

  var C=el('c'), X=C.getContext('2d'), W=0, H=0, DPR=Math.min(2, window.devicePixelRatio||1);
  function resize(){ W=C.clientWidth; H=C.clientHeight; C.width=Math.floor(W*DPR); C.height=Math.floor(H*DPR); X.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener('resize',resize); resize();

  /* ---------- audio ---------- */
  var AC=null;
  function actx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(f,dur,type,vol,slideTo){ var a=actx(); if(!a)return; var o=a.createOscillator(),g=a.createGain(); o.type=type||'square'; o.frequency.value=f;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur);
    g.gain.value=vol||0.06; g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
    o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur); }
  function sPlace(n){ beep(440+Math.min(n,20)*24,0.09,'square',0.05,700+Math.min(n,20)*24); }
  function sPerfect(n){ beep(700,0.09,'triangle',0.07,1100); setTimeout(function(){beep(1050+Math.min(n,10)*40,0.1,'triangle',0.06);},60); }
  function sTrim(){ beep(300,0.14,'sawtooth',0.05,180); }
  function sDeath(){ beep(300,0.5,'sawtooth',0.09,60); }
  var MUS=(function(){ var ac=null,on=false,tmr=0,step=0; var seq=[0,7,12,7,3,10,7,3,5,12,7,5,3,7,10,7];
    function tone(f,d,ty,v){ if(!ac)return; var o=ac.createOscillator(),g=ac.createGain(); o.type=ty; o.frequency.value=f; g.gain.value=v; g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d); o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d); }
    function fr(n){ return 130.81*Math.pow(2,n/12); }
    function tick(){ if(!on)return; var n=seq[step%seq.length]; tone(fr(n-12),0.22,'triangle',0.045); if(step%2===0) tone(fr(n+12),0.14,'square',0.022); step++; tmr=setTimeout(tick,225); }
    return { start:function(a){ if(on)return; ac=a; if(!ac)return; on=true; step=0; tick(); }, stop:function(){ on=false; clearTimeout(tmr); } };
  })();

  /* ---------- state ---------- */
  var BH; // block height
  var stack, cur, falls, parts, popups, running=false, dead=false, t=0, score=0, perfects=0, combo=0, best=0, camY=0, camTarget=0, shake=0, flash=0;
  var COLORS=['#5df2e0','#6f9dff','#b98bff','#ff6a7a','#ffd34d'];
  try{ best=+localStorage.getItem('pf_best_'+client)||0; }catch(e){}
  el('bestHint').textContent = best? ('Best: '+best+' layers'):'';
  el('backBtn').href = code? ('/rewards/?c='+client) : '/loyalty/';

  function worldY(level){ return -level*BH; }         // higher levels = more negative
  function screenY(level){ return worldY(level)+camY; }

  function reset(){
    BH=Math.max(26, Math.min(40, H*0.045));
    stack=[]; falls=[]; parts=[]; popups=[]; score=0; perfects=0; combo=0; t=0; dead=false; shake=0; flash=0;
    var w0=Math.min(W*0.52, 260);
    stack.push({x:(W-w0)/2, w:w0, level:0, col:COLORS[0]});
    camTarget=H*0.34 - worldY(0); camY=camTarget;
    spawnCur();
  }
  function spawnCur(){
    var top=stack[stack.length-1];
    var lvl=top.level+1;
    var spd=Math.min(W*0.9, W*0.42 + lvl*6);
    var fromLeft = (lvl%2===0);
    cur={ w:top.w, level:lvl, col:COLORS[lvl%COLORS.length], x: fromLeft? -top.w : W, dir: fromLeft?1:-1, spd:spd, reached:false };
    camTarget=H*0.34 - worldY(lvl);
  }

  /* ---------- drop ---------- */
  function drop(){
    if(!running||dead||!cur) return;
    var top=stack[stack.length-1];
    var delta=cur.x-top.x;
    var overlap=top.w-Math.abs(delta);
    if(overlap<=0 && !cur.reached){ return; } // block hasn't slid over the tower yet — ignore early tap
    if(overlap<=0){ // total miss
      falls.push({x:cur.x,y:worldY(cur.level),w:cur.w,col:cur.col,vy:0,vx:cur.dir*40,rot:0,vr:cur.dir*2});
      shake=18; flash=0.5; sDeath(); die(); return;
    }
    var perfect=Math.abs(delta) < Math.max(6, top.w*0.06);
    var nx, nw;
    if(perfect){
      nx=top.x; nw=top.w; perfects++; combo++;
      // reward: grow back a touch (goal-gradient / positive juice), capped
      nw=Math.min(nx+nw <= W ? nw+Math.min(14, (Math.min(W*0.52,260)-nw)) : nw, top.w+14);
      var grow=Math.min(14, Math.max(0,(Math.min(W*0.6,300)-top.w)));
      nx=top.x - grow/2; nw=top.w+grow;
      sPerfect(combo);
      popups.push({x:top.x+top.w/2, y:worldY(cur.level), txt: combo>1?('PERFECT x'+combo):'PERFECT!', life:0.8, col:'#ffd34d'});
      pop(top.x+top.w/2, worldY(cur.level), '#ffd34d', 14);
      shake=Math.max(shake,4);
    } else {
      combo=0;
      // trimmed side
      nx = delta>0 ? cur.x : top.x;
      nw = overlap;
      var trimX = delta>0 ? (top.x+top.w) : cur.x;
      var trimW = Math.abs(delta);
      falls.push({x:trimX, y:worldY(cur.level), w:trimW, col:cur.col, vy:0, vx:(delta>0?1:-1)*60, rot:0, vr:(delta>0?1:-1)*3});
      sTrim(); sPlace(cur.level); pop(nx+nw/2, worldY(cur.level), cur.col, 8);
    }
    stack.push({x:nx, w:nw, level:cur.level, col:cur.col});
    score++;
    if(nw < 12){ // too thin to continue — clean finish
      setTimeout(gameOver,500); running=false; return;
    }
    spawnCur();
  }
  function pop(x,y,col,n){ for(var i=0;i<n;i++){ var a=Math.random()*6.28,s=40+Math.random()*160; parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5,col:col,r:2+Math.random()*2}); } }
  function die(){ if(dead)return; dead=true; setTimeout(gameOver,650); }

  /* ---------- loop ---------- */
  var last=0;
  function frame(now){ if(!running) return; var dt=Math.min(0.033,(now-last)/1000||0); last=now; if(!dead) update(dt); render(); requestAnimationFrame(frame); }
  function update(dt){
    t+=dt;
    camY += (camTarget-camY)*Math.min(1,dt*6);
    if(cur && !dead){ cur.x += cur.dir*cur.spd*dt;
      if(cur.dir>0 && cur.x > W){ cur.x=W; cur.dir=-1; } else if(cur.dir<0 && cur.x+cur.w<0){ cur.x=-cur.w; cur.dir=1; }
      var top=stack[stack.length-1]; if(!cur.reached && (top.w-Math.abs(cur.x-top.x))>0) cur.reached=true;
    }
    for(var i=falls.length-1;i>=0;i--){ var f=falls[i]; f.vy+=H*1.6*dt; f.y+=f.vy*dt; f.x+=f.vx*dt; f.rot+=f.vr*dt; if(screenY(0)+f.y > H+200) falls.splice(i,1); }
    for(var k=parts.length-1;k>=0;k--){ var p=parts[k]; p.life-=dt; if(p.life<=0){ parts.splice(k,1); continue; } p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=500*dt; }
    for(var u=popups.length-1;u>=0;u--){ var o=popups[u]; o.life-=dt; o.y-=26*dt; if(o.life<=0) popups.splice(u,1); }
    if(shake>0) shake=Math.max(0,shake-dt*40);
    if(flash>0) flash=Math.max(0,flash-dt*1.4);
  }

  /* ---------- render ---------- */
  function render(){
    X.clearRect(0,0,W,H);
    drawBg();
    var sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
    X.save(); X.translate(sx,sy);
    // stack
    for(var i=0;i<stack.length;i++){ var b=stack[i]; drawBlock(b.x, screenY(b.level), b.w, b.col, i===stack.length-1); }
    // falling trims
    falls.forEach(function(f){ X.save(); X.translate(f.x+f.w/2, screenY(0)+f.y+BH/2); X.rotate(f.rot); X.globalAlpha=0.9; drawBlockRaw(-f.w/2,-BH/2,f.w,f.col,false); X.restore(); X.globalAlpha=1; });
    // current
    if(cur && !dead){ drawBlock(cur.x, screenY(cur.level), cur.w, cur.col, true);
      // drop guideline
      X.strokeStyle='rgba(255,255,255,.14)'; X.lineWidth=1; X.setLineDash([4,6]); X.beginPath(); X.moveTo(cur.x+cur.w/2, screenY(cur.level)+BH); X.lineTo(cur.x+cur.w/2, screenY(stack[stack.length-1].level)); X.stroke(); X.setLineDash([]);
    }
    // particles
    parts.forEach(function(p){ X.globalAlpha=Math.max(0,p.life*1.8); X.fillStyle=p.col; X.beginPath(); X.arc(p.x,screenY(0)+p.y,p.r,0,6.28); X.fill(); });
    X.globalAlpha=1;
    // popups
    popups.forEach(function(o){ X.globalAlpha=Math.max(0,o.life*1.4); X.fillStyle=o.col; X.font='900 20px Inter,Arial'; X.textAlign='center'; X.textBaseline='middle'; X.fillText(o.txt,o.x,screenY(0)+o.y); });
    X.globalAlpha=1;
    X.restore();
    if(flash>0){ X.fillStyle='rgba(255,59,82,'+flash*0.5+')'; X.fillRect(0,0,W,H); }
    drawHUD();
  }
  function drawBg(){
    var g=X.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0b1024'); g.addColorStop(.6,'#0a0b18'); g.addColorStop(1,'#070810');
    X.fillStyle=g; X.fillRect(0,0,W,H);
    X.globalAlpha=.05; for(var y=0;y<H;y+=90){ for(var x=((y/90)%2)*90;x<W;x+=180){ X.fillStyle='#7aa2ff'; X.fillRect(x,y,90,90); } } X.globalAlpha=1;
  }
  function drawBlock(x,y,w,col,active){ drawBlockRaw(x,y,w,col,active); }
  function drawBlockRaw(x,y,w,col,active){
    if(active){ X.shadowColor=col; X.shadowBlur=18; }
    var g=X.createLinearGradient(x,y,x,y+BH); g.addColorStop(0,col); g.addColorStop(1, shade(col,-30));
    X.fillStyle=g; roundRect(x,y,w,BH,6); X.fill();
    X.shadowBlur=0;
    // barber diagonal stripe accent
    X.save(); roundRect(x,y,w,BH,6); X.clip(); X.globalAlpha=.16; X.fillStyle='#fff';
    for(var sx2=x-BH; sx2<x+w+BH; sx2+=22){ X.beginPath(); X.moveTo(sx2,y); X.lineTo(sx2+8,y); X.lineTo(sx2+8-BH,y+BH); X.lineTo(sx2-BH,y+BH); X.closePath(); X.fill(); }
    X.restore(); X.globalAlpha=1;
    X.fillStyle='rgba(255,255,255,.25)'; X.fillRect(x+3,y+3,w-6,2);
  }
  function shade(hex,amt){ var n=parseInt(hex.slice(1),16); var r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt)); return 'rgb('+r+','+g+','+b+')'; }
  function drawHUD(){
    X.textAlign='center'; X.textBaseline='top';
    X.font='900 44px Inter,Arial'; X.fillStyle='#eef1ff'; X.fillText(score, W/2, 20);
    X.font='800 12px Inter,Arial'; X.fillStyle='#8f97b8'; X.fillText('LAYERS', W/2, 66);
    if(combo>=2){ X.fillStyle='#ffd34d'; X.font='800 15px Inter,Arial'; X.fillText('🔥 perfect streak '+combo, W/2, 84); }
    X.textAlign='right'; X.fillStyle='#8f97b8'; X.font='700 14px Inter,Arial'; X.fillText('best '+best, W-16, 20);
  }
  function roundRect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); X.beginPath(); X.moveTo(x+r,y); X.arcTo(x+w,y,x+w,y+h,r); X.arcTo(x+w,y+h,x,y+h,r); X.arcTo(x,y+h,x,y,r); X.arcTo(x,y,x+w,y,r); X.closePath(); }

  /* ---------- flow ---------- */
  var tipEl=null;
  function showTip(){ if(tipEl)return; tipEl=document.createElement('div'); tipEl.className='tiptap'; tipEl.textContent='TAP anywhere to drop the layer'; document.body.appendChild(tipEl); setTimeout(rmTip,2400); }
  function rmTip(){ if(tipEl){ tipEl.remove(); tipEl=null; } }
  function startGame(){ actx(); MUS.start(actx()); resize(); reset(); running=true; dead=false; el('startScreen').classList.add('hide'); el('overScreen').classList.add('hide'); last=performance.now(); requestAnimationFrame(frame); }
  function gameOver(){
    MUS.stop();
    running=false;
    if(score>best){ best=score; try{ localStorage.setItem('pf_best_'+client, best); }catch(e){} }
    el('ovScore').textContent=score; el('ovPerfect').textContent=perfects; el('ovBest').textContent=best;
    el('overScreen').classList.remove('hide'); el('coinsWon').classList.add('hide'); el('lbBox').classList.add('hide');
    if(code){ rpc('game_reward',{p_code:code,p_game:'stacker',p_score:score*10+perfects*4}).then(function(r){
      if(r&&!r.error&&r.coins_earned!=null){ var w=el('coinsWon'); w.textContent='🪙 +'+r.coins_earned+' coins earned'+(r.capped?' (daily max)':'')+' — spend them on the prize slot!'; w.classList.remove('hide'); }
    }).catch(function(){}); }
    loadLb();
  }
  function loadLb(){ rpc('arcade_leaderboard',{p_client:client,p_game:'stacker'}).then(function(r){
    var rows=(r&&r.rows)||[]; if(!rows.length) return;
    el('lbRows').innerHTML=rows.slice(0,5).map(function(x,i){ return '<div class="r"><span>'+(['🥇','🥈','🥉'][i]||('#'+(i+1)))+' '+String(x.name).replace(/[<>&]/g,'')+'</span><b>'+x.score+'</b></div>'; }).join('');
    el('lbBox').classList.remove('hide');
  }).catch(function(){}); }

  /* ---------- input ---------- */
  function tap(e){ if(e&&e.cancelable) e.preventDefault(); if(!running) return; drop(); }
  window.addEventListener('pointerdown',tap,{passive:false});
  window.addEventListener('keydown',function(e){ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); if(running) drop(); else if(!el('startScreen').classList.contains('hide')) startGame(); } });
  el('startBtn').addEventListener('click',function(e){ e.stopPropagation(); startGame(); showTip(); });
  el('retryBtn').addEventListener('click',function(e){ e.stopPropagation(); startGame(); });
  el('backBtn').addEventListener('click',function(e){ e.stopPropagation(); });
})();
</script>
</body>
</html>
