<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#05060d" />
<title>Puck Frenzy</title>
<link rel="preconnect" href="https://qgbjiqdwzgkjkmqyjsmc.supabase.co" crossorigin>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%2305060d'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-size='30'%3E%F0%9F%8F%92%3C/text%3E%3C/svg%3E" />
<style>
  :root{--acc:#5df2e0;--acc2:#6f9dff;--vio:#b98bff;--gold:#ffd34d;--ice:#dff2ff}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#05060d;font-family:Inter,system-ui,"Segoe UI",Arial,sans-serif;color:#eef1ff;user-select:none;touch-action:none}
  body{min-height:100dvh;display:flex;flex-direction:column;align-items:center}
  .hud{width:100%;max-width:440px;display:flex;justify-content:space-between;align-items:center;padding:9px 16px;gap:8px}
  .hud a{color:#8f97b8;text-decoration:none;font-size:13px;font-weight:700}
  .hud .score{display:flex;gap:14px;align-items:center;font-weight:900}
  .hud .score .you{color:var(--acc);font-size:24px}.hud .score .cpu{color:#ff8a9d;font-size:24px}
  .hud .score .vs{color:#8f97b8;font-size:12px}
  .hud .timer{font-weight:900;font-size:20px;color:var(--gold)}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:0 8px 10px}
  #c{border-radius:14px;box-shadow:0 0 44px rgba(122,162,255,.25);touch-action:none}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:5;background:radial-gradient(circle at 50% 30%,rgba(93,242,224,.14),transparent 55%),rgba(5,6,13,.85);backdrop-filter:blur(4px)}
  .overlay.hide{display:none}
  h1{font-size:clamp(32px,9vw,54px);margin:0 0 6px;font-weight:900;letter-spacing:-.02em;background:linear-gradient(90deg,var(--acc),var(--acc2),var(--vio));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#aeb6d6;font-size:15px;margin:0 0 20px;max-width:330px}
  .row{display:flex;gap:22px;justify-content:center;margin:8px 0}
  .row .st b{display:block;font-size:28px;font-weight:900;color:var(--acc)}.row .st span{font-size:11px;color:#8f97b8;text-transform:uppercase;letter-spacing:.06em}
  .btn{border:0;border-radius:999px;padding:16px 30px;font:inherit;font-weight:900;font-size:17px;cursor:pointer;color:#05060d;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 10px 30px rgba(93,242,224,.35);margin-top:12px}
  .btn.ghost{background:transparent;border:1px solid rgba(150,190,255,.4);color:#eef1ff;box-shadow:none;font-size:14px;padding:12px 22px}
  .coinsWon{color:var(--gold);font-weight:800;margin-top:12px;font-size:16px}
  .lb{margin-top:14px;width:min(320px,90vw);text-align:left}.lb h3{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8f97b8;margin:0 0 6px;text-align:center}
  .lb .r{display:flex;justify-content:space-between;font-size:14px;padding:5px 10px;border-radius:8px}.lb .r:nth-child(odd){background:rgba(255,255,255,.04)}.lb .r b{color:var(--acc)}
  .hint{color:#6f77a0;font-size:13px;margin-top:14px}
  .tiptap{position:fixed;left:0;right:0;bottom:16%;text-align:center;color:#eef1ff;font-weight:800;font-size:16px;opacity:.9;z-index:4;pointer-events:none;animation:bob 1.1s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="hud">
  <a id="backBtn" href="#">← Card</a>
  <div class="score"><span class="you" id="pScore">0</span><span class="vs">YOU · CPU</span><span class="cpu" id="aScore">0</span></div>
  <div class="timer" id="timer">0:60</div>
</div>
<div class="stage"><canvas id="c"></canvas></div>

<div class="overlay" id="startScreen">
  <div style="font-size:52px;margin-bottom:4px">🏒</div>
  <h1>PUCK FRENZY</h1>
  <p class="sub">Drag your mallet to smack the puck into the top goal. Most goals in 60 seconds wins. Go! 🥅</p>
  <button class="btn" id="startBtn">▶ Face off</button>
  <p class="hint" id="bestHint"></p>
</div>

<div class="overlay hide" id="overScreen">
  <h1 style="font-size:clamp(28px,8vw,46px)" id="ovTitle">FULL TIME</h1>
  <div class="row">
    <div class="st"><b id="ovYou">0</b><span>you</span></div>
    <div class="st"><b id="ovCpu">0</b><span>cpu</span></div>
    <div class="st"><b id="ovBest">0</b><span>best</span></div>
  </div>
  <div class="coinsWon hide" id="coinsWon"></div>
  <button class="btn" id="retryBtn">↻ Rematch</button>
  <div class="lb hide" id="lbBox"><h3>🏆 Top scorers</h3><div id="lbRows"></div></div>
  <a class="btn ghost" id="backBtn2" href="#" style="text-decoration:none;margin-top:12px">← Back to my card</a>
</div>

<script>
(function(){
  "use strict";
  var SUPA='https://qgbjiqdwzgkjkmqyjsmc.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmppcWR3emdramttcXlqc21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzc1NTEsImV4cCI6MjA5OTk1MzU1MX0.Naocw-B0B6Z7CLg197yxLezd58a6f5XoMLEiea5b0Ro';
  var q=new URLSearchParams(location.search);
  var client=(q.get('c')||'demo').toLowerCase().replace(/[^a-z0-9]/g,'')||'demo';
  var code=(q.get('m')||'').slice(0,40);
  function rpc(fn,args){ return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(args)}).then(function(r){return r.json();}); }
  var el=function(id){return document.getElementById(id);};
  el('backBtn').href = code?('/rewards/?c='+client):'/loyalty/'; el('backBtn2').href=el('backBtn').href;

  /* audio */
  var AC=null; function actx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(f,dur,type,vol,slideTo){ var a=actx(); if(!a)return; var o=a.createOscillator(),g=a.createGain(); o.type=type||'square'; o.frequency.value=f; if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,a.currentTime+dur); g.gain.value=vol||0.05; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur); o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur); }
  var sHit=function(){beep(260,0.05,'square',0.06,160);}, sWall=function(){beep(180,0.04,'sine',0.04);};
  var sGoalYou=function(){beep(660,0.1,'triangle',0.08,1200);setTimeout(function(){beep(990,0.14,'triangle',0.06);},90);}, sGoalCpu=function(){beep(300,0.3,'sawtooth',0.07,120);}, sBuzz=function(){beep(200,0.6,'square',0.08,120);};
  var MUS=(function(){ var ac=null,on=false,tmr=0,step=0; var seq=[0,7,12,7,3,10,7,3,5,12,7,5,3,7,10,7];
    function tone(f,d,ty,v){ if(!ac)return; var o=ac.createOscillator(),g=ac.createGain(); o.type=ty; o.frequency.value=f; g.gain.value=v; g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d); o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d); }
    function fr(n){ return 130.81*Math.pow(2,n/12); }
    function tick(){ if(!on)return; var n=seq[step%seq.length]; tone(fr(n-12),0.2,'triangle',0.045); if(step%2===0) tone(fr(n+12),0.13,'square',0.022); step++; tmr=setTimeout(tick,200); }
    return { start:function(a){ if(on)return; ac=a; if(!ac)return; on=true; step=0; tick(); }, stop:function(){ on=false; clearTimeout(tmr); } };
  })();

  var C=el('c'), X=C.getContext('2d'), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){
    var maxW=Math.min(window.innerWidth-16, 440), maxH=window.innerHeight-120;
    var w=maxW, h=Math.min(maxH, w*1.5); if(h===maxH) w=h/1.5;
    W=Math.floor(w); H=Math.floor(h);
    C.style.width=W+'px'; C.style.height=H+'px'; C.width=Math.floor(W*DPR); C.height=Math.floor(H*DPR); X.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize); resize();

  var puck, pm, am, pScore, aScore, running=false, tLeft, parts, shake, flash, goalW, best=0, last=0, trail;
  try{ best=+localStorage.getItem('ph_best_'+client)||0; }catch(e){}
  el('bestHint').textContent=best?('Best: '+best+' goals'):'';

  function reset(){
    goalW=W*0.4;
    puck={x:W/2,y:H/2,vx:0,vy:0,r:Math.max(10,W*0.035)};
    pm={x:W/2,y:H*0.82,r:Math.max(16,W*0.06),px:W/2,py:H*0.82};
    am={x:W/2,y:H*0.18,r:Math.max(16,W*0.06)};
    pScore=0; aScore=0; tLeft=60; parts=[]; shake=0; flash=0; trail=[];
    el('pScore').textContent='0'; el('aScore').textContent='0'; el('timer').textContent='1:00';
    serve(Math.random()<0.5?1:-1);
  }
  function serve(dir){ puck.x=W/2; puck.y=H/2; var a=(Math.random()-0.5)*1.2; puck.vx=Math.sin(a)*W*0.5; puck.vy=dir*W*0.6; }

  function burst(x,y,col,n){ for(var i=0;i<n;i++){ var a=Math.random()*6.28,s=60+Math.random()*260; parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.6,col:col,r:2+Math.random()*3}); } }

  var lastT=0;
  function frame(now){ if(!running) return; var dt=Math.min(0.033,(now-last)/1000||0); last=now; update(dt); render(); requestAnimationFrame(frame); }
  function update(dt){
    tLeft-=dt; if(tLeft<=0){ tLeft=0; el('timer').textContent='0:00'; return end(); }
    var secs=Math.ceil(tLeft), mm=Math.floor(secs/60), ss=secs%60; el('timer').textContent=mm+':'+(ss<10?('0'+ss):ss);
    // player mallet velocity
    var mvx=(pm.x-pm.px)/Math.max(dt,0.001), mvy=(pm.y-pm.py)/Math.max(dt,0.001); pm.px=pm.x; pm.py=pm.y;
    // AI mallet: chase puck when in its half, else return home
    var tx,ty;
    if(puck.y < H*0.52){ tx=puck.x + puck.vx*0.06; ty=Math.min(H*0.42, puck.y - am.r*0.2); }
    else { tx=W/2; ty=H*0.18; }
    var aiSpeed=W*2.2*dt; var dx=tx-am.x, dy=ty-am.y, d=Math.hypot(dx,dy)||1;
    am.x+=Math.min(aiSpeed,d)*dx/d; am.y+=Math.min(aiSpeed,d)*dy/d;
    am.x=Math.max(am.r,Math.min(W-am.r,am.x)); am.y=Math.max(am.r,Math.min(H*0.46-am.r,am.y));
    // puck physics
    puck.x+=puck.vx*dt; puck.y+=puck.vy*dt; puck.vx*=0.999; puck.vy*=0.999;
    var mx=W*1.6; puck.vx=Math.max(-mx,Math.min(mx,puck.vx)); puck.vy=Math.max(-mx,Math.min(mx,puck.vy));
    // walls
    if(puck.x<puck.r){ puck.x=puck.r; puck.vx=Math.abs(puck.vx)*0.9; sWall(); }
    if(puck.x>W-puck.r){ puck.x=W-puck.r; puck.vx=-Math.abs(puck.vx)*0.9; sWall(); }
    var gl=(W-goalW)/2, gr=(W+goalW)/2;
    // top edge
    if(puck.y<puck.r){ if(puck.x>gl&&puck.x<gr){ goal('you'); return; } puck.y=puck.r; puck.vy=Math.abs(puck.vy)*0.9; sWall(); }
    if(puck.y>H-puck.r){ if(puck.x>gl&&puck.x<gr){ goal('cpu'); return; } puck.y=H-puck.r; puck.vy=-Math.abs(puck.vy)*0.9; sWall(); }
    // mallet collisions
    collide(pm, mvx, mvy); collide(am, (am.x-(am.ox||am.x))/Math.max(dt,0.001), (am.y-(am.oy||am.y))/Math.max(dt,0.001));
    am.ox=am.x; am.oy=am.y;
    trail.push({x:puck.x,y:puck.y}); if(trail.length>8) trail.shift();
    for(var k=parts.length-1;k>=0;k--){ var p=parts[k]; p.life-=dt; if(p.life<=0){parts.splice(k,1);continue;} p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt; }
    if(shake>0) shake=Math.max(0,shake-dt*30); if(flash>0) flash=Math.max(0,flash-dt*2);
  }
  function collide(m,mvx,mvy){
    var dx=puck.x-m.x, dy=puck.y-m.y, d=Math.hypot(dx,dy), min=puck.r+m.r;
    if(d<min && d>0){ var nx=dx/d, ny=dy/d; puck.x=m.x+nx*min; puck.y=m.y+ny*min;
      var vn=puck.vx*nx+puck.vy*ny; puck.vx-=2*vn*nx; puck.vy-=2*vn*ny;
      puck.vx=puck.vx*0.6+ (mvx||0)*0.5 + nx*W*0.4; puck.vy=puck.vy*0.6+ (mvy||0)*0.5 + ny*W*0.4;
      sHit(); shake=Math.max(shake,4); burst(puck.x,puck.y,'#dff2ff',5);
    }
  }
  function goal(who){
    if(who==='you'){ pScore++; el('pScore').textContent=pScore; sGoalYou(); flash=1; burst(W/2,0,'#5df2e0',26); }
    else { aScore++; el('aScore').textContent=aScore; sGoalCpu(); burst(W/2,H,'#ff8a9d',20); }
    shake=16; serve(who==='you'?-1:1);
  }

  function render(){
    X.clearRect(0,0,W,H);
    var sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake; X.save(); X.translate(sx,sy);
    // ice
    var g=X.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0f1a30'); g.addColorStop(.5,'#12233f'); g.addColorStop(1,'#0f1a30'); X.fillStyle=g; X.fillRect(0,0,W,H);
    // center line + circle
    X.strokeStyle='rgba(93,242,224,.25)'; X.lineWidth=2; X.beginPath(); X.moveTo(0,H/2); X.lineTo(W,H/2); X.stroke();
    X.beginPath(); X.arc(W/2,H/2,W*0.16,0,6.28); X.stroke();
    X.strokeStyle='rgba(255,255,255,.08)'; X.strokeRect(3,3,W-6,H-6);
    // goals (barber-striped mouth)
    var gl=(W-goalW)/2;
    drawGoal(gl,0,goalW,'#ff8a9d'); drawGoal(gl,H-6,goalW,'#5df2e0');
    // puck trail
    for(var i=0;i<trail.length;i++){ X.globalAlpha=i/trail.length*0.4; X.fillStyle='#dff2ff'; X.beginPath(); X.arc(trail[i].x,trail[i].y,puck.r*0.7,0,6.28); X.fill(); }
    X.globalAlpha=1;
    // mallets
    drawMallet(am,'#ff8a9d'); drawMallet(pm,'#5df2e0');
    // puck
    X.fillStyle='#05060d'; X.beginPath(); X.arc(puck.x,puck.y,puck.r,0,6.28); X.fill();
    X.strokeStyle='rgba(223,242,255,.6)'; X.lineWidth=2; X.stroke();
    parts.forEach(function(p){ X.globalAlpha=Math.max(0,p.life*1.6); X.fillStyle=p.col; X.beginPath(); X.arc(p.x,p.y,p.r,0,6.28); X.fill(); }); X.globalAlpha=1;
    X.restore();
    if(flash>0){ X.fillStyle='rgba(93,242,224,'+flash*0.28+')'; X.fillRect(0,0,W,H); }
  }
  function drawGoal(x,y,w,col){ X.fillStyle=col; X.globalAlpha=.85; X.fillRect(x,y,w,6); X.globalAlpha=1; X.fillStyle='rgba(255,255,255,.5)'; for(var i=x;i<x+w;i+=16){ X.fillRect(i,y,8,6); } }
  function drawMallet(m,col){ X.fillStyle='rgba(0,0,0,.25)'; X.beginPath(); X.arc(m.x,m.y+3,m.r,0,6.28); X.fill();
    var g=X.createRadialGradient(m.x-m.r*0.3,m.y-m.r*0.3,2,m.x,m.y,m.r); g.addColorStop(0,'#fff'); g.addColorStop(.4,col); g.addColorStop(1,col);
    X.fillStyle=g; X.beginPath(); X.arc(m.x,m.y,m.r,0,6.28); X.fill();
    X.fillStyle='rgba(5,6,13,.85)'; X.beginPath(); X.arc(m.x,m.y,m.r*0.5,0,6.28); X.fill(); }

  // input: drag player mallet (bottom half)
  function pos(e){ var r=C.getBoundingClientRect(); var t=(e.touches&&e.touches[0])||e; return {x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height)}; }
  var dragging=false;
  function down(e){ if(!running)return; dragging=true; move(e); }
  function move(e){ if(!running||!dragging)return; if(e.cancelable)e.preventDefault(); var p=pos(e);
    pm.x=Math.max(pm.r,Math.min(W-pm.r,p.x)); pm.y=Math.max(H*0.52+pm.r*0.2,Math.min(H-pm.r,p.y)); }
  function up(){ dragging=false; }
  C.addEventListener('pointerdown',down); C.addEventListener('pointermove',move,{passive:false}); window.addEventListener('pointerup',up);

  function start(){ if(running) return; actx(); MUS.start(actx()); resize(); reset(); running=true; last=performance.now(); el('startScreen').classList.add('hide'); el('overScreen').classList.add('hide'); rmTip(); requestAnimationFrame(frame); }
  var tipEl=null; function showTip(){ if(tipEl)return; tipEl=document.createElement('div'); tipEl.className='tiptap'; tipEl.textContent='Drag your mallet to hit the puck ↑'; document.body.appendChild(tipEl); setTimeout(rmTip,2600); }
  function rmTip(){ if(tipEl){ tipEl.remove(); tipEl=null; } }
  function end(){
    running=false; MUS.stop(); sBuzz();
    if(pScore>best){ best=pScore; try{ localStorage.setItem('ph_best_'+client,best); }catch(e){} }
    el('ovTitle').textContent = pScore>aScore?'YOU WIN! 🏆':(pScore<aScore?'CPU WINS':'DEAD HEAT');
    el('ovYou').textContent=pScore; el('ovCpu').textContent=aScore; el('ovBest').textContent=best;
    el('overScreen').classList.remove('hide'); el('coinsWon').classList.add('hide'); el('lbBox').classList.add('hide');
    if(code){ rpc('game_reward',{p_code:code,p_game:'hockey',p_score:pScore*30 + (pScore>aScore?60:0)}).then(function(r){
      if(r&&!r.error&&r.coins_earned!=null){ var w=el('coinsWon'); w.textContent='🪙 +'+r.coins_earned+' coins earned'+(r.capped?' (daily max)':'')+(r.multiplier>1?' · 2× day!':'')+' — spend them on prizes!'; w.classList.remove('hide'); }
    }).catch(function(){}); }
    rpc('arcade_leaderboard',{p_client:client,p_game:'hockey'}).then(function(r){ var rows=(r&&r.rows)||[]; if(!rows.length)return;
      el('lbRows').innerHTML=rows.slice(0,5).map(function(x,i){ return '<div class="r"><span>'+(['🥇','🥈','🥉'][i]||('#'+(i+1)))+' '+String(x.name).replace(/[<>&]/g,'')+'</span><b>'+x.score+'</b></div>'; }).join('');
      el('lbBox').classList.remove('hide'); }).catch(function(){});
  }
  el('startBtn').addEventListener('click',function(e){ e.stopPropagation(); start(); showTip(); });
  el('retryBtn').addEventListener('click',function(e){ e.stopPropagation(); start(); });
})();
</script>
</body>
</html>
