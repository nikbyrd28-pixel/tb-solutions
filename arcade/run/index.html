    X.strokeStyle='#2b2f45'; X.lineWidth=5; X.lineCap='round';
    if(player.onGround){ X.beginPath(); X.moveTo(-2,r*0.7); X.lineTo(-2+sw,r*1.15); X.stroke(); X.beginPath(); X.moveTo(4,r*0.7); X.lineTo(4+sw2,r*1.15); X.stroke(); }
    else { X.beginPath(); X.moveTo(-2,r*0.7); X.lineTo(-8,r*1.05); X.stroke(); X.beginPath(); X.moveTo(4,r*0.7); X.lineTo(10,r*1.0); X.stroke(); }
    // head
    X.fillStyle='#f1c9a5'; X.beginPath(); X.arc(0,-r*0.75,r*0.5,0,6.28); X.fill();
    // fresh fade hair
    X.fillStyle='#2b2f45'; X.beginPath(); X.arc(0,-r*0.85,r*0.5,3.14,6.28); X.fill(); X.fillRect(-r*0.5,-r*0.9,r*1.0,r*0.16);
    // eye
    X.fillStyle='#2b2f45'; X.beginPath(); X.arc(r*0.18,-r*0.75,2.2,0,6.28); X.fill();
    X.restore();
  }
  function drawHUD(){
    X.fillStyle='#eef1ff'; X.textAlign='left'; X.textBaseline='top';
    X.font='900 30px Inter,Arial'; X.fillText(Math.floor(dist)+' m', 16, 14);
    X.font='800 18px Inter,Arial'; X.fillStyle='#ffd34d'; X.fillText('✂ '+coinCount, 18, 50);
    if(combo>=3){ X.fillStyle='#5df2e0'; X.font='800 16px Inter,Arial'; X.fillText('COMBO x'+combo, 18, 74); }
    X.textAlign='right'; X.fillStyle='#8f97b8'; X.font='700 14px Inter,Arial'; X.fillText('best '+best+'m', W-16, 18);
  }
  function roundRect(x,y,w,h,r){ X.beginPath(); X.moveTo(x+r,y); X.arcTo(x+w,y,x+w,y+h,r); X.arcTo(x+w,y+h,x,y+h,r); X.arcTo(x,y+h,x,y,r); X.arcTo(x,y,x+w,y,r); X.closePath(); }

  /* ---------- flow ---------- */
  function startGame(){ if(running) return; actx(); MUS.start(actx()); resize(); tuneJump(); reset(); running=true; dead=false; el('startScreen').classList.add('hide'); el('overScreen').classList.add('hide'); rmTip(); last=performance.now(); requestAnimationFrame(frame); }
  var tipEl=null;
  function showTip(){ if(tipEl)return; tipEl=document.createElement('div'); tipEl.className='tiptap'; tipEl.textContent='TAP to jump ·  again in the air to double-jump'; document.body.appendChild(tipEl); setTimeout(rmTip,2600); }
  function rmTip(){ if(tipEl){ tipEl.remove(); tipEl=null; } }
  function gameOver(){
    running=false; MUS.stop();
    var m=Math.floor(dist);
    if(m>best){ best=m; try{ localStorage.setItem('bd_best_'+client, best); }catch(e){} }
    el('ovScore').textContent=m; el('ovCoins').textContent=coinCount; el('ovBest').textContent=best;
    el('overScreen').classList.remove('hide');
    el('coinsWon').classList.add('hide'); el('lbBox').classList.add('hide');
    // award Loop coins if signed-in member
    if(code){
      rpc('game_reward',{p_code:code,p_game:'runner',p_score:Math.max(m, coinCount*4)}).then(function(r){
        if(r && !r.error && r.coins_earned!=null){
          var w=el('coinsWon'); w.textContent='🪙 +'+r.coins_earned+' coins earned'+(r.capped?' (daily max)':'')+' — spend them on the prize slot!'; w.classList.remove('hide');
        }
      }).catch(function(){});
    }
    loadLb();
  }
  function loadLb(){
    rpc('arcade_leaderboard',{p_client:client,p_game:'runner'}).then(function(r){
      var rows=(r&&r.rows)||[]; if(!rows.length) return;
      el('lbRows').innerHTML=rows.slice(0,5).map(function(x,i){ return '<div class="r"><span>'+(['🥇','🥈','🥉'][i]||('#'+(i+1)))+' '+String(x.name).replace(/[<>&]/g,'')+'</span><b>'+x.score+'m</b></div>'; }).join('');
      el('lbBox').classList.remove('hide');
    }).catch(function(){});
  }

  // input
  function tap(e){ if(!running){ return; } if(e&&e.cancelable) e.preventDefault(); jump(); }
  window.addEventListener('pointerdown',tap,{passive:false});
  window.addEventListener('keydown',function(e){ if(e.repeat) return; if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); if(running) jump(); else if(!el('startScreen').classList.contains('hide')) startGame(); } });
  el('startBtn').addEventListener('click',function(e){ e.stopPropagation(); startGame(); showTip(); });
  el('retryBtn').addEventListener('click',function(e){ e.stopPropagation(); startGame(); });
  el('backBtn').addEventListener('click',function(e){ e.stopPropagation(); });
})();
</script>
</body>
</html>
