<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0a2a1a" />
<title>Loop Video Poker</title>
<link rel="preconnect" href="https://qgbjiqdwzgkjkmqyjsmc.supabase.co" crossorigin>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%230a2a1a'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-size='30'%3E%E2%99%A0%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<style>
  :root{--felt:#0d3a24;--felt2:#0a2a1a;--gold:#ffd34d;--acc:#5df2e0}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;font-family:Inter,system-ui,"Segoe UI",Arial,sans-serif;color:#eef1ff;user-select:none;
    background:radial-gradient(ellipse at 50% 22%,#125036,var(--felt) 46%,var(--felt2) 100%)}
  body{min-height:100dvh;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:10px}
  .top a{color:#bfe6d4;text-decoration:none;font-size:13px;font-weight:700}
  .bal{background:rgba(0,0,0,.28);border:1px solid rgba(255,211,77,.4);border-radius:999px;padding:7px 14px;font-weight:900;color:var(--gold);font-size:14px}
  h1{margin:0;font-size:16px;font-weight:900}h1 span{color:var(--gold)}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 14px 18px;max-width:560px;width:100%;margin:0 auto}
  .pay{width:100%;border:1px solid rgba(255,211,77,.25);border-radius:12px;overflow:hidden;margin-bottom:14px;font-size:12.5px}
  .pay .pr{display:flex;justify-content:space-between;padding:5px 12px}
  .pay .pr:nth-child(odd){background:rgba(0,0,0,.18)}
  .pay .pr.on{background:rgba(255,211,77,.22);color:#fff;font-weight:800}
  .pay .pr b{color:var(--gold)}
  .banner{min-height:32px;font-weight:900;font-size:21px;margin:2px 0 10px;text-align:center}
  .banner.win{color:var(--gold)} .banner.lose{color:#ff8a9d}
  .hand{display:flex;gap:8px;justify-content:center;margin-bottom:6px}
  .slot{display:flex;flex-direction:column;align-items:center;gap:6px}
  .card{width:60px;height:86px;border-radius:9px;background:#fbfbff;color:#16324a;position:relative;box-shadow:0 6px 16px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;font-weight:900;cursor:pointer;transition:transform .12s;animation:deal .3s cubic-bezier(.2,.9,.3,1.2) both}
  @keyframes deal{from{opacity:0;transform:translateY(-30px) scale(.9)}to{opacity:1;transform:none}}
  .card.red{color:#e23b52}
  .card.held{transform:translateY(-10px);box-shadow:0 10px 22px rgba(255,211,77,.5);outline:3px solid var(--gold)}
  .card .rk{position:absolute;top:4px;left:6px;font-size:13px;line-height:1}
  .card .rk small{display:block;font-size:11px}
  .card .mid{font-size:28px}
  .card .rk.br{top:auto;left:auto;bottom:4px;right:6px;transform:rotate(180deg)}
  .card.empty{background:rgba(255,255,255,.06);border:2px dashed rgba(255,255,255,.25);box-shadow:none;cursor:default;animation:none}
  .hbadge{font-size:10px;font-weight:900;letter-spacing:.08em;color:var(--gold);min-height:14px}
  .controls{width:100%;max-width:560px;padding:0 14px 20px;margin:0 auto}
  .bets{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .chip{width:50px;height:50px;border-radius:50%;border:3px dashed rgba(255,255,255,.6);background:radial-gradient(circle at 50% 40%,#1a6b45,#0c3b25);color:#fff;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.35)}
  .chip.sel{border-color:var(--gold);color:var(--gold);box-shadow:0 0 16px rgba(255,211,77,.5);transform:translateY(-3px)}
  .btn{width:100%;border:0;border-radius:14px;padding:16px;font:inherit;font-weight:900;font-size:17px;cursor:pointer;color:#04150d;background:linear-gradient(135deg,var(--gold),#ff9d5a);box-shadow:0 8px 22px rgba(255,211,77,.3)}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.4)}
  .note{color:rgba(255,255,255,.6);font-size:12px;text-align:center;margin-top:10px}
  .hide{display:none!important}
  .gate{margin:auto;text-align:center;max-width:320px;padding:30px}
</style>
</head>
<body>
<div class="top">
  <a id="backBtn" href="#">← Card</a>
  <h1>Video <span>Poker</span></h1>
  <span class="bal" id="bal">🪙 —</span>
</div>

<div class="wrap" id="wrap">
  <div class="pay" id="paytable"></div>
  <div class="banner" id="banner">Jacks or Better</div>
  <div class="hand" id="hand"></div>
</div>

<div class="controls" id="controls">
  <div id="betRow" class="bets">
    <span style="font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6)">Bet</span>
    <button class="chip" data-b="1">1</button>
    <button class="chip sel" data-b="5">5</button>
    <button class="chip" data-b="10">10</button>
    <button class="chip" data-b="25">25</button>
  </div>
  <button class="btn" id="actBtn">🃏 Deal</button>
  <p class="note" id="note">Tap cards to HOLD, then Draw. Coins are for fun &amp; prizes — no cash value.</p>
</div>

<div class="gate hide" id="gate">
  <div style="font-size:48px">♠️</div>
  <h1 style="font-size:22px;margin:12px 0">Play from your Loop card</h1>
  <p style="color:#bfe6d4">Video Poker uses the 🪙 coins on your loyalty card. Open your card to play.</p>
  <a class="btn" id="gateBtn" href="#" style="display:block;text-decoration:none;margin-top:16px">Open my card →</a>
</div>

<script>
(function(){
  "use strict";
  var SUPA='https://qgbjiqdwzgkjkmqyjsmc.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmppcWR3emdramttcXlqc21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzc1NTEsImV4cCI6MjA5OTk1MzU1MX0.Naocw-B0B6Z7CLg197yxLezd58a6f5XoMLEiea5b0Ro';
  var q=new URLSearchParams(location.search);
  var slug=(q.get('c')||'demo').toLowerCase().replace(/[^a-z0-9]/g,'')||'demo';
  var code=(q.get('m')||'').slice(0,40);
  function rpc(fn,args){ return fetch(SUPA+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(args)}).then(function(r){return r.json();}); }
  var el=function(id){return document.getElementById(id);};
  el('backBtn').href='/rewards/?c='+slug; el('gateBtn').href='/rewards/?c='+slug;
  if(!code){ el('wrap').classList.add('hide'); el('controls').classList.add('hide'); el('gate').classList.remove('hide'); return; }

  var AC=null;
  function actx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(f,dur,type,vol,slideTo){ var a=actx(); if(!a)return; var o=a.createOscillator(),g=a.createGain(); o.type=type||'sine'; o.frequency.value=f;
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,a.currentTime+dur); g.gain.value=vol||0.05; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur); o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur); }
  var sDeal=function(){beep(300,0.07,'sine',0.05,180);};
  var sHold=function(){beep(660,0.05,'square',0.04);};
  var sWin=function(){beep(660,0.1,'triangle',0.07,990);setTimeout(function(){beep(990,0.12,'triangle',0.06);},90);setTimeout(function(){beep(1320,0.14,'triangle',0.05);},180);};
  var sLose=function(){beep(300,0.35,'sawtooth',0.06,90);};

  var PAY=[['royal','Royal Flush',250],['straight_flush','Straight Flush',50],['four','Four of a Kind',25],['full_house','Full House',9],['flush','Flush',6],['straight','Straight',4],['three','Three of a Kind',3],['two_pair','Two Pair',2],['jacks','Jacks or Better',1]];
  el('paytable').innerHTML=PAY.map(function(p){return '<div class="pr" id="pay_'+p[0]+'"><span>'+p[1]+'</span><b>'+p[2]+'×</b></div>';}).join('');
  var RANKNAME={}; PAY.forEach(function(p){RANKNAME[p[0]]=p[1];});

  var SUIT={S:'♠',H:'♥',D:'♦',C:'♣'}, RED={H:1,D:1};
  function rankTxt(r){ return r==='T'?'10':r; }
  function cardHtml(cd,i,held){
    if(!cd) return '<div class="slot"><div class="card empty"></div><div class="hbadge"></div></div>';
    var r=cd.slice(0,cd.length-1), s=cd.slice(-1), red=RED[s]?' red':'';
    return '<div class="slot"><div class="card'+red+(held?' held':'')+'" data-i="'+i+'">'
      +'<span class="rk">'+rankTxt(r)+'<small>'+SUIT[s]+'</small></span><span class="mid">'+SUIT[s]+'</span>'
      +'<span class="rk br">'+rankTxt(r)+'<small>'+SUIT[s]+'</small></span></div>'
      +'<div class="hbadge">'+(held?'HELD':'')+'</div></div>';
  }
  var hand=[null,null,null,null,null], holds={}, phase='bet', busy=false, bet=5;
  function renderHand(){ el('hand').innerHTML=hand.map(function(c,i){return cardHtml(c,i,!!holds[i]);}).join('');
    if(phase==='draw'){ Array.prototype.forEach.call(document.querySelectorAll('#hand .card:not(.empty)'),function(cd){
      cd.addEventListener('click',function(){ if(busy)return; var i=+cd.getAttribute('data-i'); holds[i]=!holds[i]; sHold(); renderHand(); }); }); } }
  function setBal(c){ if(c!=null) el('bal').textContent='🪙 '+c; }
  function highlightPay(rk){ Array.prototype.forEach.call(document.querySelectorAll('.pr'),function(p){p.classList.remove('on');}); if(rk&&el('pay_'+rk)) el('pay_'+rk).classList.add('on'); }
  function banner(t,cls){ var b=el('banner'); b.textContent=t; b.className='banner'+(cls?(' '+cls):''); }

  Array.prototype.forEach.call(document.querySelectorAll('.chip'),function(ch){
    ch.addEventListener('click',function(){ if(phase!=='bet')return; bet=+ch.getAttribute('data-b');
      Array.prototype.forEach.call(document.querySelectorAll('.chip'),function(c){c.classList.toggle('sel',c===ch);}); });
  });

  el('actBtn').addEventListener('click',function(){
    if(busy)return; actx();
    if(phase==='bet'){
      busy=true; el('actBtn').disabled=true; highlightPay(null); banner('Dealing…');
      rpc('vp_deal',{p_code:code,p_bet:bet}).then(function(st){
        busy=false; el('actBtn').disabled=false;
        if(!st||st.error){ banner(st&&st.error||'Error','lose'); return; }
        hand=st.hand.slice(); holds={}; phase='draw'; setBal(st.coins); sDeal(); renderHand();
        banner('Tap cards to HOLD'); el('actBtn').textContent='🔄 Draw'; el('betRow').style.opacity='.4';
      }).catch(function(){ busy=false; el('actBtn').disabled=false; banner('Network error — try again','lose'); });
    } else if(phase==='draw'){
      busy=true; el('actBtn').disabled=true;
      var keep=[]; for(var i=0;i<5;i++) if(holds[i]) keep.push(i);
      rpc('vp_draw',{p_code:code,p_holds:keep}).then(function(st){
        busy=false; el('actBtn').disabled=false;
        if(!st||st.error){ banner(st&&st.error||'Error','lose'); return; }
        hand=st.hand.slice(); phase='bet'; setBal(st.coins); sDeal();
        // reveal replaced cards
        holds={}; for(var j=0;j<5;j++) holds[j]=false; renderHand();
        highlightPay(st.payout>0?st.rank:null);
        if(st.payout>0){ banner('🎉 '+(RANKNAME[st.rank]||'Win')+' · +'+st.payout+' 🪙','win'); sWin(); }
        else { banner('No win — deal again','lose'); sLose(); }
        el('actBtn').textContent='🃏 Deal'; el('betRow').style.opacity='1';
      }).catch(function(){ busy=false; el('actBtn').disabled=false; });
    }
  });

  rpc('get_member',{p_code:code}).then(function(m){ if(m&&m.coins!=null) setBal(m.coins); }).catch(function(){});
  renderHand();
})();
</script>
</body>
</html>
