<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>TB Command Center</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235df2e0'/%3E%3Cstop offset='.55' stop-color='%236f9dff'/%3E%3Cstop offset='1' stop-color='%23b98bff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='15' fill='%23070a12'/%3E%3Ctext x='50%25' y='53%25' text-anchor='middle' dominant-baseline='middle' font-family='Arial' font-weight='900' font-size='30' fill='url(%23g)'%3ETB%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --void:#05070f;--panel:rgba(18,22,40,.55);--panel2:#0c1020;--text:#eef1ff;--muted:#96a0c4;
    --line:rgba(150,190,255,.15);--line2:rgba(150,195,255,.34);
    --cyan:#5df2e0;--blue:#6f9dff;--violet:#b98bff;--pink:#ff8fd6;--green:#7CFCC6;--amber:#ffcf6b;--red:#ff8a8a;
    --grad:linear-gradient(120deg,var(--cyan),var(--blue) 55%,var(--violet));
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Space Grotesk",Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:
    radial-gradient(circle at 12% -8%,rgba(94,242,224,.10),transparent 34%),
    radial-gradient(circle at 90% 4%,rgba(185,139,255,.10),transparent 36%),
    linear-gradient(180deg,#05070f,#03040a);color:var(--text);min-height:100vh}
  a{color:var(--cyan)}
  .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  /* sidebar */
  .side{border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto;background:rgba(6,8,15,.6);backdrop-filter:blur(12px)}
  .brand{font-weight:900;font-size:19px;letter-spacing:-.02em;padding:6px 10px 18px}
  .brand span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .navb{display:flex;flex-direction:column;gap:4px}
  .navb button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:0;color:var(--muted);font:inherit;font-weight:600;padding:11px 12px;border-radius:12px;cursor:pointer}
  .navb button .ic{width:20px;text-align:center}
  .navb button:hover{color:var(--text);background:rgba(150,190,255,.06)}
  .navb button.on{color:var(--text);background:rgba(94,242,224,.10);box-shadow:inset 0 0 0 1px var(--line2)}
  .side .foot{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;line-height:1.5}
  /* main */
  .main{padding:26px clamp(16px,3vw,34px)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  h1{font-size:clamp(22px,3vw,30px);margin:0;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:3px 0 0}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);background:rgba(150,190,255,.06);color:var(--text);border-radius:999px;padding:10px 16px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none}
  .btn:hover{border-color:var(--cyan)}
  .btn.primary{border:0;background:var(--grad);color:#03040a;font-weight:800}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.ghost{background:none}
  .btn.danger{border-color:rgba(255,138,138,.4);color:var(--red)}
  /* cards + grid */
  .grid{display:grid;gap:14px}
  .stat-row{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .card{background:linear-gradient(180deg,rgba(150,190,255,.06),rgba(150,190,255,.02));border:1px solid var(--line);border-radius:18px;padding:18px}
  .stat b{display:block;font-size:30px;font-weight:900;letter-spacing:-.02em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat span{color:var(--muted);font-size:13px}
  .section-h{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px}
  .section-h h2{font-size:16px;margin:0;letter-spacing:.02em;text-transform:uppercase;color:var(--muted)}
  /* kanban */
  .board{display:grid;grid-template-columns:repeat(6,minmax(210px,1fr));gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{background:rgba(10,14,26,.5);border:1px solid var(--line);border-radius:16px;padding:12px;min-height:120px}
  .col h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;color:var(--muted);display:flex;justify-content:space-between}
  .col h3 em{font-style:normal;color:var(--text);background:rgba(150,190,255,.1);border-radius:999px;padding:1px 8px;font-size:11px}
  .lead{background:linear-gradient(180deg,rgba(150,190,255,.08),rgba(150,190,255,.03));border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px;cursor:pointer}
  .lead:hover{border-color:var(--line2)}
  .lead b{font-size:14px;display:block}
  .lead small{color:var(--muted);font-size:12px}
  .lead .tagline{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .pill{font-size:11px;border-radius:999px;padding:2px 8px;border:1px solid var(--line);color:var(--muted)}
  .pill.due{border-color:rgba(255,207,107,.5);color:var(--amber)}
  .pill.over{border-color:rgba(255,138,138,.5);color:var(--red)}
  /* table (clients/tasks) */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  tr:hover td{background:rgba(150,190,255,.03)}
  .status-sel,.stage-sel{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 8px;font:inherit;font-size:13px}
  .chk{width:20px;height:20px;border-radius:6px;border:1px solid var(--line2);background:none;cursor:pointer;display:grid;place-items:center;color:var(--green)}
  .done td{opacity:.5}
  .done .ttl{text-decoration:line-through}
  .empty{color:var(--muted);text-align:center;padding:40px 10px;border:1px dashed var(--line);border-radius:14px}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(2,3,8,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .ov.on{display:flex}
  .modal{width:min(520px,100%);max-height:92vh;overflow:auto;background:linear-gradient(160deg,#0c1020,#080a15);border:1px solid var(--line2);border-radius:20px;padding:22px}
  .modal h3{margin:0 0 4px}
  .modal .close{float:right;background:none;border:0;color:var(--muted);font-size:20px;cursor:pointer}
  label.f{display:block;margin:12px 0 0;font-size:13px;color:var(--muted);font-weight:600}
  input,select,textarea{width:100%;background:rgba(3,4,10,.5);border:1px solid var(--line2);border-radius:10px;padding:11px 12px;color:var(--text);font:inherit;font-size:15px;margin-top:5px}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .out{white-space:pre-wrap;background:rgba(3,4,10,.5);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:13px;line-height:1.6;max-height:340px;overflow:auto;margin-top:12px}
  .tool-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tool-tabs button{border:1px solid var(--line);background:none;color:var(--muted);border-radius:999px;padding:8px 14px;font:inherit;font-weight:600;cursor:pointer}
  .tool-tabs button.on{color:var(--text);border-color:var(--line2);background:rgba(94,242,224,.08)}
  .hint{color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.5}
  .badge{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px;background:rgba(185,139,255,.14);color:var(--violet);border:1px solid rgba(185,139,255,.3)}
  .mobtop{display:none}
  /* auth */
  .authwrap{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 15% 0,rgba(94,242,224,.1),transparent 40%),radial-gradient(circle at 85% 10%,rgba(185,139,255,.1),transparent 42%),#05070f}
  .authcard{width:min(400px,100%);background:linear-gradient(160deg,#0c1020,#080a15);border:1px solid var(--line2);border-radius:22px;padding:28px}
  .authcard .brand{padding:0 0 8px;font-size:22px}
  .authcard p{color:var(--muted);font-size:14px;margin:0 0 6px}
  .authmsg{font-size:13px;margin:10px 0 0;min-height:18px}
  .authmsg.err{color:var(--red)} .authmsg.ok{color:var(--green)}
  .cloud-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-right:6px}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .2s;width:230px}
    .side.open{transform:none}
    .mobtop{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .board{grid-template-columns:repeat(6,minmax(76vw,1fr))}
    .row2{grid-template-columns:1fr}
    .hide-sm{display:none}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="ov" id="scrim" onclick="toggleSide(false)" style="background:transparent;backdrop-filter:none"></div>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">TB <span>Command</span></div>
    <nav class="navb" id="nav">
      <button data-view="dashboard" class="on"><span class="ic">◈</span> Dashboard</button>
      <button data-view="leads"><span class="ic">◎</span> Leads</button>
      <button data-view="clients"><span class="ic">★</span> Clients</button>
      <button data-view="tasks"><span class="ic">✓</span> Tasks</button>
      <button data-view="tools"><span class="ic">✦</span> Marketing Tools</button>
      <button data-view="data"><span class="ic">⤓</span> Backup / Data</button>
    </nav>
    <div class="foot">
      <b style="color:var(--text)">Saved on this device.</b><br>
      Cloud sync (phone + laptop) is one step away — see Backup / Data.
    </div>
  </aside>

  <main class="main">
    <div class="mobtop">
      <button class="btn sm" onclick="toggleSide(true)">☰ Menu</button>
      <b>TB Command</b>
    </div>
    <div id="view"></div>
  </main>
</div>

<!-- modal -->
<div class="ov" id="ov">
  <div class="modal">
    <button class="close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
/* ============================================================
   CLOUD SYNC CONFIG — paste your two Supabase values here.
   Leave blank to keep saving on this device only.
   ============================================================ */
var SUPA_URL = 'https://ewipzalkaybrsyxlhlob.supabase.co';
var SUPA_KEY = 'sb_publishable_Y5I0Gey6qVjh8ya4HwofUA_GVE_86VA';

var supa=null, cloud=false, user=null, cache={leads:[],clients:[],tasks:[]};

// n8n automation: new leads added here also fire to your n8n workflow (fire-and-forget).
var N8N_WEBHOOK='https://n8n-fouz.srv1786777.hstgr.cloud/webhook/12eeac52-a592-4988-b61a-2c2a16baa388';
function n8nSend(payload){ if(!N8N_WEBHOOK) return; try{ var b=new URLSearchParams(); Object.keys(payload).forEach(function(k){ b.append(k, payload[k]==null?'':payload[k]); }); fetch(N8N_WEBHOOK,{method:'POST',mode:'no-cors',body:b}).catch(function(){}); }catch(e){} }

/* ---------- storage layer: localStorage OR Supabase, same interface ---------- */
var DB={
  read:function(k){
    if(cloud) return cache[k]||[];
    try{ return JSON.parse(localStorage.getItem('tb_'+k))||[]; }catch(e){ return []; }
  },
  write:function(k,v){
    if(cloud){ cache[k]=v; supaSave(k,v); }
    else { localStorage.setItem('tb_'+k, JSON.stringify(v)); }
  }
};
function supaSave(k,v){
  if(!supa||!user) return;
  supa.from('kv').upsert({user_id:user.id,key:k,value:v},{onConflict:'user_id,key'})
    .then(function(r){ if(r.error) console.warn('sync error',r.error.message); });
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':(''+s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayISO(){ var d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(s){ if(!s) return ''; var d=new Date(s+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

var STAGES=['New','Contacted','Interested','Booked','Won','Lost'];
var CLIENT_STATUS=['Onboarding','In progress','Review','Live','On hold','Done'];

/* ---------- state ---------- */
var state={ leads:[], clients:[], tasks:[] };
function save(k){ DB.write(k, state[k]); }
function loadState(){ state.leads=DB.read('leads'); state.clients=DB.read('clients'); state.tasks=DB.read('tasks'); }

/* ---------- nav ---------- */
var cur='dashboard';
document.getElementById('nav').addEventListener('click',function(e){
  var b=e.target.closest('button[data-view]'); if(!b) return;
  cur=b.getAttribute('data-view');
  [].forEach.call(document.querySelectorAll('#nav button'),function(x){x.classList.toggle('on',x===b);});
  render(); toggleSide(false);
});
function toggleSide(open){ document.getElementById('side').classList.toggle('open',open); document.getElementById('scrim').classList.toggle('on',open); }

/* ---------- modal ---------- */
function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('ov').classList.add('on'); }
function closeModal(){ document.getElementById('ov').classList.remove('on'); }
document.getElementById('ov').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });

/* ---------- helpers ---------- */
function overdue(d){ return d && d<todayISO(); }
function dueToday(d){ return d===todayISO(); }

/* ================= VIEWS ================= */
function render(){ document.getElementById('view').innerHTML = ({dashboard:vDash,leads:vLeads,clients:vClients,tasks:vTasks,tools:vTools,data:vData}[cur])(); if(cur==='tools') initTools(); }

/* ---- Dashboard ---- */
function vDash(){
  var byStage={}; STAGES.forEach(function(s){byStage[s]=0;});
  state.leads.forEach(function(l){ byStage[l.stage]=(byStage[l.stage]||0)+1; });
  var activeClients=state.clients.filter(function(c){return c.status!=='Done';}).length;
  var openTasks=state.tasks.filter(function(t){return !t.done;});
  var dueList=[];
  state.tasks.forEach(function(t){ if(!t.done && t.due) dueList.push({type:'Task',title:t.title,due:t.due}); });
  state.leads.forEach(function(l){ if(l.followup && l.stage!=='Won' && l.stage!=='Lost') dueList.push({type:'Follow up',title:(l.name||l.business),due:l.followup}); });
  dueList.sort(function(a,b){return (a.due||'')<(b.due||'')?-1:1;});
  var due=dueList.filter(function(x){return overdue(x.due)||dueToday(x.due);});
  var pipeline=state.leads.filter(function(l){return l.stage!=='Won'&&l.stage!=='Lost';}).length;
  return '<div class="topbar"><div><h1>Dashboard</h1><p class="sub">'+new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+'</p></div>'
    +'<button class="btn primary" onclick="addLead()">+ New lead</button></div>'
    +'<div class="grid stat-row">'
    +'<div class="card stat"><b>'+pipeline+'</b><span>Active leads in pipeline</span></div>'
    +'<div class="card stat"><b>'+byStage['Booked']+'</b><span>Booked calls</span></div>'
    +'<div class="card stat"><b>'+activeClients+'</b><span>Active clients</span></div>'
    +'<div class="card stat"><b>'+openTasks.length+'</b><span>Open tasks</span></div></div>'
    +'<div class="section-h"><h2>Due today &amp; overdue</h2></div>'
    +(due.length? '<div class="card"><table><tbody>'+due.map(function(x){
        return '<tr><td style="width:90px"><span class="pill '+(overdue(x.due)?'over':'due')+'">'+(overdue(x.due)?'Overdue':'Today')+'</span></td><td><b>'+esc(x.title)+'</b></td><td class="hide-sm" style="color:var(--muted)">'+x.type+'</td><td style="text-align:right;color:var(--muted)">'+fmtDate(x.due)+'</td></tr>';
      }).join('')+'</tbody></table></div>'
      : '<div class="empty">Nothing due. Add a follow-up date to a lead or a task to see it here.</div>');
}

/* ---- Leads (kanban) ---- */
function vLeads(){
  var cols=STAGES.map(function(s){
    var items=state.leads.filter(function(l){return l.stage===s;});
    return '<div class="col"><h3>'+s+' <em>'+items.length+'</em></h3>'
      + items.map(leadCard).join('')
      +'</div>';
  }).join('');
  return '<div class="topbar"><div><h1>Leads</h1><p class="sub">'+state.leads.length+' total · drag through the stages as they progress</p></div>'
    +'<button class="btn primary" onclick="addLead()">+ New lead</button></div>'
    +'<div class="board">'+cols+'</div>';
}
function leadCard(l){
  var f=''; if(l.followup && l.stage!=='Won' && l.stage!=='Lost'){ f='<span class="pill '+(overdue(l.followup)?'over':(dueToday(l.followup)?'due':''))+'">↻ '+fmtDate(l.followup)+'</span>'; }
  return '<div class="lead" onclick="editLead(\''+l.id+'\')"><b>'+esc(l.name||l.business||'Untitled')+'</b>'
    + (l.business&&l.name? '<small>'+esc(l.business)+'</small>':'')
    + '<div class="tagline">'+ (l.source?'<span class="pill">'+esc(l.source)+'</span>':'') + f +'</div></div>';
}
function leadForm(l){
  l=l||{};
  return '<h3>'+(l.id?'Edit lead':'New lead')+'</h3><p class="sub">Track a prospect from first contact to booked.</p>'
    +'<label class="f">Name</label><input id="l_name" value="'+esc(l.name)+'" placeholder="Contact name">'
    +'<label class="f">Business</label><input id="l_business" value="'+esc(l.business)+'" placeholder="Business name">'
    +'<div class="row2"><div><label class="f">Phone</label><input id="l_phone" value="'+esc(l.phone)+'"></div><div><label class="f">Email</label><input id="l_email" value="'+esc(l.email)+'"></div></div>'
    +'<div class="row2"><div><label class="f">Stage</label><select id="l_stage">'+STAGES.map(function(s){return '<option'+(l.stage===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'
    +'<div><label class="f">Where from?</label><input id="l_source" value="'+esc(l.source)+'" placeholder="Cold call, IG, group..."></div></div>'
    +'<label class="f">Next follow-up date</label><input id="l_followup" type="date" value="'+esc(l.followup)+'">'
    +'<label class="f">Notes</label><textarea id="l_note" placeholder="What they need, what you said...">'+esc(l.note)+'</textarea>'
    +'<div class="modal-actions"><button class="btn primary" onclick="saveLead(\''+(l.id||'')+'\')">Save</button>'
    + (l.id?'<button class="btn danger" onclick="delLead(\''+l.id+'\')">Delete</button>':'')
    +'<button class="btn ghost" onclick="closeModal()">Cancel</button></div>';
}
function addLead(){ openModal(leadForm({stage:'New'})); }
function editLead(id){ openModal(leadForm(state.leads.filter(function(x){return x.id===id;})[0])); }
function saveLead(id){
  var o={ name:val('l_name'),business:val('l_business'),phone:val('l_phone'),email:val('l_email'),stage:val('l_stage'),source:val('l_source'),followup:val('l_followup'),note:val('l_note') };
  if(id){ state.leads=state.leads.map(function(x){return x.id===id?Object.assign(x,o):x;}); }
  else { o.id=uid(); o.createdAt=Date.now(); state.leads.unshift(o); n8nSend(Object.assign({source:'CRM new lead',ts:new Date().toISOString()},o)); }
  save('leads'); closeModal(); render();
}
function delLead(id){ if(!confirm('Delete this lead?'))return; state.leads=state.leads.filter(function(x){return x.id!==id;}); save('leads'); closeModal(); render(); }

/* ---- Clients ---- */
function vClients(){
  var rows=state.clients.map(function(c){
    return '<tr><td><b>'+esc(c.business||c.name||'—')+'</b>'+(c.name&&c.business?'<br><small style="color:var(--muted)">'+esc(c.name)+'</small>':'')+'</td>'
      +'<td>'+esc(c.project||'')+'</td>'
      +'<td><select class="status-sel" onchange="setClientStatus(\''+c.id+'\',this.value)">'+CLIENT_STATUS.map(function(s){return '<option'+(c.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></td>'
      +'<td class="hide-sm">'+(c.value?'$'+esc(c.value):'')+'</td>'
      +'<td style="text-align:right"><button class="btn sm ghost" onclick="editClient(\''+c.id+'\')">Open</button></td></tr>';
  }).join('');
  return '<div class="topbar"><div><h1>Clients</h1><p class="sub">'+state.clients.length+' total · '+state.clients.filter(function(c){return c.status!=='Done';}).length+' active</p></div>'
    +'<button class="btn primary" onclick="addClient()">+ New client</button></div>'
    +(state.clients.length? '<div class="card" style="padding:4px 4px"><table><thead><tr><th>Client</th><th>Project</th><th>Status</th><th class="hide-sm">Value</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      : '<div class="empty">No clients yet. When a lead becomes a paying client, add them here.</div>');
}
function clientForm(c){ c=c||{};
  return '<h3>'+(c.id?'Edit client':'New client')+'</h3>'
    +'<div class="row2"><div><label class="f">Business</label><input id="c_business" value="'+esc(c.business)+'"></div><div><label class="f">Contact name</label><input id="c_name" value="'+esc(c.name)+'"></div></div>'
    +'<div class="row2"><div><label class="f">Phone</label><input id="c_phone" value="'+esc(c.phone)+'"></div><div><label class="f">Email</label><input id="c_email" value="'+esc(c.email)+'"></div></div>'
    +'<label class="f">Project</label><input id="c_project" value="'+esc(c.project)+'" placeholder="One-page website, ads setup...">'
    +'<div class="row2"><div><label class="f">Status</label><select id="c_status">'+CLIENT_STATUS.map(function(s){return '<option'+(c.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'
    +'<div><label class="f">Value ($)</label><input id="c_value" value="'+esc(c.value)+'" placeholder="300"></div></div>'
    +'<label class="f">Notes</label><textarea id="c_note">'+esc(c.note)+'</textarea>'
    +'<div class="modal-actions"><button class="btn primary" onclick="saveClient(\''+(c.id||'')+'\')">Save</button>'
    +(c.id?'<button class="btn danger" onclick="delClient(\''+c.id+'\')">Delete</button>':'')
    +'<button class="btn ghost" onclick="closeModal()">Cancel</button></div>';
}
function addClient(){ openModal(clientForm({status:'Onboarding'})); }
function editClient(id){ openModal(clientForm(state.clients.filter(function(x){return x.id===id;})[0])); }
function saveClient(id){
  var o={ business:val('c_business'),name:val('c_name'),phone:val('c_phone'),email:val('c_email'),project:val('c_project'),status:val('c_status'),value:val('c_value'),note:val('c_note') };
  if(id){ state.clients=state.clients.map(function(x){return x.id===id?Object.assign(x,o):x;}); }
  else { o.id=uid(); o.createdAt=Date.now(); state.clients.unshift(o); }
  save('clients'); closeModal(); render();
}
function setClientStatus(id,v){ state.clients=state.clients.map(function(x){return x.id===id?Object.assign(x,{status:v}):x;}); save('clients'); }
function delClient(id){ if(!confirm('Delete this client?'))return; state.clients=state.clients.filter(function(x){return x.id!==id;}); save('clients'); closeModal(); render(); }

/* ---- Tasks ---- */
function vTasks(){
  var open=state.tasks.filter(function(t){return !t.done;}).sort(function(a,b){return (a.due||'9')<(b.due||'9')?-1:1;});
  var done=state.tasks.filter(function(t){return t.done;});
  function rowT(t){
    var tag=''; if(!t.done && t.due){ tag='<span class="pill '+(overdue(t.due)?'over':(dueToday(t.due)?'due':''))+'">'+fmtDate(t.due)+'</span>'; }
    return '<tr class="'+(t.done?'done':'')+'"><td style="width:34px"><button class="chk" onclick="toggleTask(\''+t.id+'\')">'+(t.done?'✓':'')+'</button></td>'
      +'<td class="ttl"><b>'+esc(t.title)+'</b></td><td style="text-align:right">'+tag+' <button class="btn sm ghost" onclick="delTask(\''+t.id+'\')">✕</button></td></tr>';
  }
  return '<div class="topbar"><div><h1>Tasks &amp; follow-ups</h1><p class="sub">'+open.length+' open</p></div>'
    +'<button class="btn primary" onclick="addTask()">+ New task</button></div>'
    +(open.length?'<div class="card" style="padding:4px 4px"><table><tbody>'+open.map(rowT).join('')+'</tbody></table></div>':'<div class="empty">No open tasks. Add one to stay on top of follow-ups.</div>')
    +(done.length?'<div class="section-h"><h2>Done</h2></div><div class="card" style="padding:4px 4px"><table><tbody>'+done.map(rowT).join('')+'</tbody></table></div>':'');
}
function addTask(){
  openModal('<h3>New task</h3><label class="f">What needs doing?</label><input id="t_title" placeholder="Follow up with...">'
    +'<label class="f">Due date (optional)</label><input id="t_due" type="date">'
    +'<div class="modal-actions"><button class="btn primary" onclick="saveTask()">Add task</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>');
}
function saveTask(){ var t=val('t_title'); if(!t){return;} state.tasks.unshift({id:uid(),title:t,due:val('t_due'),done:false,createdAt:Date.now()}); save('tasks'); closeModal(); render(); }
function toggleTask(id){ state.tasks=state.tasks.map(function(x){return x.id===id?Object.assign(x,{done:!x.done}):x;}); save('tasks'); render(); }
function delTask(id){ state.tasks=state.tasks.filter(function(x){return x.id!==id;}); save('tasks'); render(); }

/* ---- Marketing Tools ---- */
function vTools(){
  return '<div class="topbar"><div><h1>Marketing Tools</h1><p class="sub">Free helpers — no accounts, no keys needed</p></div></div>'
    +'<div class="tool-tabs" id="ttabs">'
    +'<button data-t="kw" class="on">Local keyword ideas</button>'
    +'<button data-t="content">Content &amp; post ideas</button>'
    +'<button data-t="outreach">Outreach templates</button></div>'
    +'<div id="toolbody"></div>';
}
function initTools(){
  var tb=document.getElementById('ttabs');
  tb.addEventListener('click',function(e){ var b=e.target.closest('button[data-t]'); if(!b)return;
    [].forEach.call(tb.children,function(x){x.classList.toggle('on',x===b);}); tool(b.getAttribute('data-t')); });
  tool('kw');
}
function tool(t){
  var el=document.getElementById('toolbody');
  if(t==='kw'){
    el.innerHTML='<p class="hint">Type what you do and the towns you serve. You get a ready-to-use list of local search phrases people actually type into Google — great for your website, Google listing, and ads.</p>'
      +'<div class="card"><div class="row2"><div><label class="f">Service you offer</label><input id="kw_s" placeholder="e.g. web design, plumbing, house cleaning"></div>'
      +'<div><label class="f">Towns (comma separated)</label><input id="kw_t" placeholder="West Chester, Exton, Malvern"></div></div>'
      +'<div style="margin-top:14px"><button class="btn primary" onclick="genKW()">Generate keywords</button></div>'
      +'<div id="kw_out"></div></div>';
  } else if(t==='content'){
    el.innerHTML='<p class="hint">Get a month of post ideas tailored to your business — captions included. Use them on Instagram, Facebook, or Google.</p>'
      +'<div class="card"><label class="f">What\'s the business?</label><input id="ct_b" placeholder="e.g. a local bakery, a barber, my web design studio">'
      +'<div style="margin-top:14px"><button class="btn primary" onclick="genContent()">Generate 12 post ideas</button></div><div id="ct_out"></div></div>';
  } else {
    el.innerHTML='<p class="hint">Copy-and-fill templates for cold outreach. Swap the [brackets] for real details.</p>'
      +'<div class="card"><label class="f">Your name</label><input id="ot_n" placeholder="Nick" value="Nick">'
      +'<label class="f">What you offer</label><input id="ot_o" placeholder="websites that get more customers">'
      +'<div style="margin-top:14px"><button class="btn primary" onclick="genOutreach()">Make my templates</button></div><div id="ot_out"></div></div>';
  }
}
function copyBtn(id){ return '<button class="btn sm" style="margin-top:10px" onclick="copyOut(\''+id+'\')">📋 Copy all</button>'; }
function copyOut(id){ var t=document.getElementById(id).innerText; navigator.clipboard&&navigator.clipboard.writeText(t); var b=event.target; var o=b.textContent; b.textContent='✓ Copied'; setTimeout(function(){b.textContent=o;},1400); }
function genKW(){
  var s=(val('kw_s')||'').trim().toLowerCase(); var towns=(val('kw_t')||'').split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(!s||!towns.length){ document.getElementById('kw_out').innerHTML='<p class="hint" style="margin-top:12px">Enter a service and at least one town.</p>'; return; }
  var mods=['','best ','affordable ','top ','local ']; var tails=[' near me',' company',' services',' quotes',' prices','']; var out=[];
  towns.forEach(function(tn){
    out.push(s+' '+tn); out.push(s+' in '+tn); out.push('best '+s+' in '+tn); out.push(s+' near '+tn); out.push(tn+' '+s); out.push('affordable '+s+' '+tn);
  });
  out.push(s+' near me'); out.push('local '+s); out.push('best '+s+' near me');
  out=out.filter(function(v,i,a){return a.indexOf(v)===i;});
  document.getElementById('kw_out').innerHTML='<div class="out" id="kw_res">'+out.join('\n')+'</div>'+copyBtn('kw_res');
}
function genContent(){
  var b=(val('ct_b')||'your business').trim();
  var ideas=[
    ['Before & after','Show a before/after of your work. Caption: “Swipe to see the transformation 👀 This is what a fresh look does for '+b+'.”'],
    ['Meet the owner','A photo of you + your story. Caption: “Hi, I’m the face behind '+b+'. Here’s why I do what I do.”'],
    ['Quick tip','One helpful tip your customers don’t know. Caption: “Save this 📌 One thing most people get wrong…”'],
    ['FAQ answer','Answer your most-asked question. Caption: “You asked, so here’s the honest answer 👇”'],
    ['Behind the scenes','Show your process/day. Caption: “Ever wonder what goes into it? Come behind the scenes.”'],
    ['Testimonial ask','Ask happy customers to review. Caption: “Loved working with you? A quick review means the world 🙏”'],
    ['Local shoutout','Tag another local business you love. Caption: “Supporting local 💙 Go check out…”'],
    ['Offer / promo','A limited offer. Caption: “This week only 🚀 Book now before spots fill up.”'],
    ['Myth vs fact','Bust a common myth in your field. Caption: “Myth: … Fact: … Let’s clear this up.”'],
    ['Result / win','Share a recent win or number. Caption: “Proud of this one 🙌 Here’s what we pulled off for a client.”'],
    ['This or that','Fun poll for your audience. Caption: “Help me settle this 👇 Which do you prefer?”'],
    ['Call to action','Straight ask. Caption: “Ready to get started? Book a free call — link in bio.”']
  ];
  document.getElementById('ct_out').innerHTML='<div class="out" id="ct_res">'+ideas.map(function(x,i){return (i+1)+'. '+x[0]+'\n   '+x[1];}).join('\n\n')+'</div>'+copyBtn('ct_res');
}
function genOutreach(){
  var n=val('ot_n')||'Nick'; var o=val('ot_o')||'websites that bring in more customers';
  var t=[
    'COLD DM / TEXT:\nHey [name]! I came across [business] and really liked what you’re doing. I help local businesses with '+o+'. Mind if I send over a quick free idea for yours? — '+n,
    'COLD EMAIL:\nSubject: quick idea for [business]\n\nHi [name], I’m '+n+' — I build '+o+' for local businesses here in Chester County. I put together one free idea that could help [business] get more calls. Want me to send it over? No pressure either way.',
    'FOLLOW-UP (no reply):\nHey [name], just floating this back up in case it got buried. Happy to share that free idea for [business] whenever — even if now’s not the right time. — '+n,
    'AFTER A "MAYBE LATER":\nTotally get it, [name] — timing matters. I’ll check back in a few weeks. In the meantime here’s the one thing I’d fix first: [tip]. Talk soon! — '+n
  ];
  document.getElementById('ot_out').innerHTML='<div class="out" id="ot_res">'+t.join('\n\n———\n\n')+'</div>'+copyBtn('ot_res');
}

/* ---- Data / backup ---- */
function vData(){
  var count=state.leads.length+state.clients.length+state.tasks.length;
  return '<div class="topbar"><div><h1>Backup / Data</h1><p class="sub">'+count+' records saved on this device</p></div></div>'
    +'<div class="card"><h3 style="margin:0 0 6px">Download a backup</h3><p class="hint">Saves everything (leads, clients, tasks) to a file. Do this weekly, or before switching devices.</p><button class="btn primary" onclick="exportData()">⤓ Download backup</button></div>'
    +'<div class="card" style="margin-top:14px"><h3 style="margin:0 0 6px">Restore from a backup</h3><p class="hint">Load a backup file. This replaces what\'s here now.</p><input type="file" id="imp" accept="application/json"><div style="margin-top:10px"><button class="btn" onclick="importData()">Restore</button></div></div>'
    +'<div class="card" style="margin-top:14px"><h3 style="margin:0 0 6px">Cloud sync '+(cloud?'<span class="badge" style="background:rgba(124,252,198,.14);color:var(--green);border-color:rgba(124,252,198,.3)">on</span>':'<span class="badge">off</span>')+'</h3><p class="hint">'+(cloud?'You\'re logged in and syncing across every device. Add on your phone, see it on your laptop.':'Your data is on this device only. To sync across phone + laptop: create a free Supabase project, run the setup, and paste your URL + anon key into the app. Full steps are in hq/SETUP.md in your repo.')+'</p>'+(cloud?'<button class="btn ghost" onclick="logout()">Log out</button>':'')+'</div>'
    +'<div class="card" style="margin-top:14px"><h3 style="margin:0 0 6px;color:var(--red)">Danger zone</h3><button class="btn danger" onclick="wipe()">Erase everything</button></div>';
}
function exportData(){
  var blob=new Blob([JSON.stringify({leads:state.leads,clients:state.clients,tasks:state.tasks,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tb-command-backup-'+todayISO()+'.json'; a.click();
}
function importData(){
  var f=document.getElementById('imp').files[0]; if(!f){alert('Choose a file first.');return;}
  var r=new FileReader(); r.onload=function(){ try{ var d=JSON.parse(r.result);
    state.leads=d.leads||[]; state.clients=d.clients||[]; state.tasks=d.tasks||[];
    save('leads');save('clients');save('tasks'); alert('Restored!'); render();
  }catch(e){ alert('That file could not be read.'); } }; r.readAsText(f);
}
function wipe(){ if(!confirm('Erase ALL leads, clients and tasks? This cannot be undone.'))return; state.leads=[];state.clients=[];state.tasks=[]; save('leads');save('clients');save('tasks'); render(); }

function val(id){ var e=document.getElementById(id); return e?e.value.trim():''; }

function seedIfFirstLocal(){
  if(!cloud && !localStorage.getItem('tb_seeded')){
    localStorage.setItem('tb_seeded','1');
    state.leads=[{id:uid(),name:'Example Lead',business:'Joe\'s Pizza',phone:'',email:'',stage:'Contacted',source:'Cold call',followup:todayISO(),note:'Interested in a new website. Follow up today.',createdAt:Date.now()}];
    save('leads');
  }
}
function startApp(){
  loadState();
  seedIfFirstLocal();
  var foot=document.querySelector('.side .foot');
  if(foot){ foot.innerHTML = cloud
    ? '<b style="color:var(--text)"><span class="cloud-dot"></span>Cloud sync on</b><br>Synced across your devices.<br><button class="btn sm ghost" style="margin-top:10px" onclick="logout()">Log out</button>'
    : '<b style="color:var(--text)">Saved on this device.</b><br>Cloud sync (phone + laptop) is one step away — see Backup / Data.'; }
  render();
}

/* ---------- cloud auth ---------- */
function showLogin(mode){
  mode=mode||'in';
  var w=document.createElement('div'); w.className='authwrap'; w.id='authwrap';
  w.innerHTML='<div class="authcard"><div class="brand">TB <span style="background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent">Command</span></div>'
    +'<p>'+(mode==='up'?'Create your account to sync across devices.':'Log in to your command center.')+'</p>'
    +'<label class="f">Email</label><input id="au_email" type="email" autocomplete="username">'
    +'<label class="f">Password</label><input id="au_pass" type="password" autocomplete="current-password">'
    +'<div class="modal-actions"><button class="btn primary" id="au_go">'+(mode==='up'?'Create account':'Log in')+'</button></div>'
    +'<p class="authmsg" id="au_msg"></p>'
    +'<p style="margin-top:14px">'+(mode==='up'?'Already set up? <a href="#" id="au_swap">Log in</a>':'First time? <a href="#" id="au_swap">Create your account</a>')+'</p></div>';
  document.body.appendChild(w);
  document.getElementById('au_go').onclick=function(){ doAuth(mode); };
  document.getElementById('au_pass').addEventListener('keydown',function(e){ if(e.key==='Enter') doAuth(mode); });
  document.getElementById('au_swap').onclick=function(e){ e.preventDefault(); w.remove(); showLogin(mode==='up'?'in':'up'); };
}
function authMsg(t,ok){ var m=document.getElementById('au_msg'); if(m){ m.textContent=t; m.className='authmsg '+(ok?'ok':'err'); } }
function doAuth(mode){
  var email=val('au_email'), pass=val('au_pass');
  if(!email||!pass){ authMsg('Enter your email and password.'); return; }
  document.getElementById('au_go').textContent='Please wait…';
  var p = mode==='up' ? supa.auth.signUp({email:email,password:pass}) : supa.auth.signInWithPassword({email:email,password:pass});
  p.then(function(r){
    if(r.error){ authMsg(r.error.message); document.getElementById('au_go').textContent=(mode==='up'?'Create account':'Log in'); return; }
    if(mode==='up' && !r.data.session){ authMsg('Account made! Check your email to confirm, then log in.',true); document.getElementById('au_go').textContent='Create account'; return; }
    finishLogin(r.data.user||r.data.session.user);
  });
}
function finishLogin(u){
  user=u; cloud=true;
  var w=document.getElementById('authwrap'); if(w) w.remove();
  supa.from('kv').select('key,value').then(function(r){
    cache={leads:[],clients:[],tasks:[]};
    (r.data||[]).forEach(function(row){ cache[row.key]=row.value||[]; });
    startApp();
  });
}
function logout(){ if(supa) supa.auth.signOut(); location.reload(); }

/* ---------- boot ---------- */
function boot(){
  if(SUPA_URL && SUPA_KEY && window.supabase){
    supa=window.supabase.createClient(SUPA_URL, SUPA_KEY);
    supa.auth.getSession().then(function(r){
      if(r.data && r.data.session){ finishLogin(r.data.session.user); }
      else { showLogin('in'); }
    });
  } else {
    startApp(); // local-only mode
  }
}
boot();
</script>
