<style>
  :root{
    --void:#05070f;--panel:rgba(18,22,40,.55);--panel2:#0c1020;--text:#eef1ff;--muted:#96a0c4;
    --line:rgba(150,190,255,.15);--line2:rgba(150,195,255,.34);
    --cyan:#5df2e0;--blue:#6f9dff;--violet:#b98bff;--pink:#ff8fd6;--green:#7CFCC6;--amber:#ffcf6b;--red:#ff8a8a;
    --grad:linear-gradient(120deg,var(--cyan),var(--blue) 55%,var(--violet));
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Space Grotesk",Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:
    radial-gradient(circle at 12% -8%,rgba(94,242,224,.10),transparent 34%),
    radial-gradient(circle at 90% 4%,rgba(185,139,255,.10),transparent 36%),
    linear-gradient(180deg,#05070f,#03040a);color:var(--text);min-height:100vh}
  a{color:var(--cyan)}
  .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  /* sidebar */
  .side{border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto;background:rgba(6,8,15,.6);backdrop-filter:blur(12px)}
  .brand{font-weight:900;font-size:19px;letter-spacing:-.02em;padding:6px 10px 18px}
  .brand span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .navb{display:flex;flex-direction:column;gap:4px}
  .navb button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:0;color:var(--muted);font:inherit;font-weight:600;padding:11px 12px;border-radius:12px;cursor:pointer}
  .navb button .ic{width:20px;text-align:center}
  .navb button:hover{color:var(--text);background:rgba(150,190,255,.06)}
  .navb button.on{color:var(--text);background:rgba(94,242,224,.10);box-shadow:inset 0 0 0 1px var(--line2)}
  .side .foot{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;line-height:1.5}
  /* main */
  .main{padding:26px clamp(16px,3vw,34px)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  h1{font-size:clamp(22px,3vw,30px);margin:0;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:3px 0 0}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);background:rgba(150,190,255,.06);color:var(--text);border-radius:999px;padding:10px 16px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none}
  .btn:hover{border-color:var(--cyan)}
  .btn.primary{border:0;background:var(--grad);color:#03040a;font-weight:800}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.ghost{background:none}
  .btn.danger{border-color:rgba(255,138,138,.4);color:var(--red)}
  /* cards + grid */
  .grid{display:grid;gap:14px}
  .stat-row{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .card{background:linear-gradient(180deg,rgba(150,190,255,.06),rgba(150,190,255,.02));border:1px solid var(--line);border-radius:18px;padding:18px}
  .stat b{display:block;font-size:30px;font-weight:900;letter-spacing:-.02em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat span{color:var(--muted);font-size:13px}
  .section-h{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px}
  .section-h h2{font-size:16px;margin:0;letter-spacing:.02em;text-transform:uppercase;color:var(--muted)}
  /* kanban */
  .board{display:grid;grid-template-columns:repeat(6,minmax(210px,1fr));gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{background:rgba(10,14,26,.5);border:1px solid var(--line);border-radius:16px;padding:12px;min-height:120px}
  .col h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;color:var(--muted);display:flex;justify-content:space-between}
  .col h3 em{font-style:normal;color:var(--text);background:rgba(150,190,255,.1);border-radius:999px;padding:1px 8px;font-size:11px}
  .lead{background:linear-gradient(180deg,rgba(150,190,255,.08),rgba(150,190,255,.03));border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px;cursor:pointer}
  .lead:hover{border-color:var(--line2)}
  .lead b{font-size:14px;display:block}
  .lead small{color:var(--muted);font-size:12px}
  .lead .tagline{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .pill{font-size:11px;border-radius:999px;padding:2px 8px;border:1px solid var(--line);color:var(--muted)}
  .pill.due{border-color:rgba(255,207,107,.5);color:var(--amber)}
  .pill.over{border-color:rgba(255,138,138,.5);color:var(--red)}
  /* table (clients/tasks) */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  tr:hover td{background:rgba(150,190,255,.03)}
  .status-sel,.stage-sel{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 8px;font:inherit;font-size:13px}
  .chk{width:20px;height:20px;border-radius:6px;border:1px solid var(--line2);background:none;cursor:pointer;display:grid;place-items:center;color:var(--green)}
  .done td{opacity:.5}
  .done .ttl{text-decoration:line-through}
  .empty{color:var(--muted);text-align:center;padding:40px 10px;border:1px dashed var(--line);border-radius:14px}
  .nbadge{margin-left:auto;background:var(--grad);color:#03040a;border-radius:999px;font-size:11px;font-weight:800;padding:1px 7px;font-style:normal}
  .gsr{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer}
  .gsr:hover{background:rgba(150,190,255,.06)}
  .gsr small{color:var(--muted)}
  .ai-input{background:rgba(150,190,255,.06);border:1px solid var(--line);border-radius:999px;padding:12px 16px;color:var(--text);font:inherit;font-size:14px}
  .ai-input:focus{outline:none;border-color:var(--cyan)}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(2,3,8,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .ov.on{display:flex}
  .modal{width:min(520px,100%);max-height:92vh;overflow:auto;background:linear-gradient(160deg,#0c1020,#080a15);border:1px solid var(--line2);border-radius:20px;padding:22px}
  .modal h3{margin:0 0 4px}
  .modal .close{float:right;background:none;border:0;color:var(--muted);font-size:20px;cursor:pointer}
  label.f{display:block;margin:12px 0 0;font-size:13px;color:var(--muted);font-weight:600}
  input,select,textarea{width:100%;background:rgba(3,4,10,.5);border:1px solid var(--line2);border-radius:10px;padding:11px 12px;color:var(--text);font:inherit;font-size:15px;margin-top:5px}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .out{white-space:pre-wrap;background:rgba(3,4,10,.5);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:13px;line-height:1.6;max-height:340px;overflow:auto;margin-top:12px}
  .tool-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tool-tabs button{border:1px solid var(--line);background:none;color:var(--muted);border-radius:999px;padding:8px 14px;font:inherit;font-weight:600;cursor:pointer}
  .tool-tabs button.on{color:var(--text);border-color:var(--line2);background:rgba(94,242,224,.08)}
  .hint{color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.5}
  .badge{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px;background:rgba(185,139,255,.14);color:var(--violet);border:1px solid rgba(185,139,255,.3)}
  .mobtop{display:none}
  /* auth */
  .authwrap{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 15% 0,rgba(94,242,224,.1),transparent 40%),radial-gradient(circle at 85% 10%,rgba(185,139,255,.1),transparent 42%),#05070f}
  .authcard{width:min(400px,100%);background:linear-gradient(160deg,#0c1020,#080a15);border:1px solid var(--line2);border-radius:22px;padding:28px}
  .authcard .brand{padding:0 0 8px;font-size:22px}
  .authcard p{color:var(--muted);font-size:14px;margin:0 0 6px}
  .authmsg{font-size:13px;margin:10px 0 0;min-height:18px}
  .authmsg.err{color:var(--red)} .authmsg.ok{color:var(--green)}
  .cloud-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-right:6px}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .2s;width:230px}
    .side.open{transform:none}
    .mobtop{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .board{grid-template-columns:repeat(6,minmax(76vw,1fr))}
    .row2{grid-template-columns:1fr}
    .hide-sm{display:none}
  }
.soon{font-size:9px;background:rgba(139,123,255,.2);color:#b9adff;border-radius:999px;padding:1px 7px;margin-left:6px;font-style:normal;font-weight:700;vertical-align:middle}
.toast{position:fixed;right:16px;bottom:16px;z-index:9999;background:linear-gradient(135deg,rgba(93,242,224,.15),rgba(139,123,255,.15)),#101425;border:1px solid rgba(93,242,224,.4);border-radius:14px;padding:14px 16px;max-width:320px;box-shadow:0 8px 30px rgba(0,0,0,.5);cursor:pointer;animation:toastIn .25s ease}
.toast b{display:block;margin-bottom:2px}
.toast small{color:var(--muted)}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
</style>

function n8nSend(payload){ if(!N8N_WEBHOOK) return; try{ var b=new URLSearchParams(); Object.keys(payload).forEach(function(k){ b.append(k, payload[k]==null?'':payload[k]); }); fetch(N8N_WEBHOOK,{method:'POST',mode:'no-cors',body:b}).catch(function(){}); }catch(e){} }

/* ---------- storage: localStorage (local mode) or real Supabase tables (cloud) ---------- */
var COLS={
  leads:['id','name','business','phone','email','stage','source','followup','note'],
  clients:['id','business','name','phone','email','project','status','value','paylink','dep','bal','note'],
  tasks:['id','title','due','done'],
  posts:['id','content','platform','status','post_date']
};
function rowFor(t,o){
  var r={}; COLS[t].forEach(function(c){
    var v=o[c];
    if((c==='followup'||c==='due'||c==='post_date') && !v) v=null;
    r[c]=(v===undefined)?null:v;
  });
  if(t==='tasks') r.done=!!o.done;
  return r;
}
var DB={
  read:function(k){ try{ return JSON.parse(localStorage.getItem('tb_'+k))||[]; }catch(e){ return []; } },
  write:function(k,v){ localStorage.setItem('tb_'+k, JSON.stringify(v)); }
};
function upsertRow(t,o){ if(!cloud||!o) return; supa.from(t).upsert(rowFor(t,o)).then(function(r){ if(r.error) console.warn('sync',t,r.error.message); }); }
function removeRow(t,id){ if(!cloud) return; supa.from(t).delete().eq('id',id).then(function(r){ if(r.error) console.warn('del',t,r.error.message); }); }
function bulkUpsert(t,arr){ if(!cloud||!arr.length) return Promise.resolve({}); return supa.from(t).upsert(arr.map(function(o){return rowFor(t,o);})); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':(''+s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayISO(){ var d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(s){ if(!s) return ''; var d=new Date(s+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

var STAGES=['New','Contacted','Interested','Booked','Won','Lost'];
var CLIENT_STATUS=['Onboarding','In progress','Review','Live','On hold','Done'];

/* ---------- state ---------- */
var state={ leads:[], clients:[], tasks:[], posts:[] };
function save(k){ if(!cloud) DB.write(k, state[k]); }
function loadState(){ state.leads=DB.read('leads'); state.clients=DB.read('clients'); state.tasks=DB.read('tasks'); state.posts=DB.read('posts'); }

/* ---------- nav ---------- */
var cur='dashboard';
document.getElementById('nav').addEventListener('click',function(e){
  var b=e.target.closest('button[data-view]'); if(!b) return;
  cur=b.getAttribute('data-view');
  [].forEach.call(document.querySelectorAll('#nav button'),function(x){x.classList.toggle('on',x===b);});
  render(); toggleSide(false);
});
function toggleSide(open){ document.getElementById('side').classList.toggle('open',open); document.getElementById('scrim').classList.toggle('on',open); }

/* ---------- modal ---------- */
function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('ov').classList.add('on'); }
function closeModal(){ document.getElementById('ov').classList.remove('on'); }
document.getElementById('ov').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });

/* ---------- helpers ---------- */
function overdue(d){ return d && d<todayISO(); }
function dueToday(d){ return d===todayISO(); }

/* ================= VIEWS ================= */
function render(){ document.getElementById('view').innerHTML = ({dashboard:vDash,links:vLinks,leads:vLeads,clients:vClients,tasks:vTasks,prospects:vProspects,intakes:vIntakes,requests:vRequests,clientleads:vClientLeads,analytics:vAnalytics,social:vSocial,tools:vTools,data:vData,pipelines:vPipelines,emailsms:vEmailSms,aianswer:vAiAnswer,aioutbound:vAiOutbound,reviews:vReviews,everyone:vEveryone,finder:vFinder,loyalty:vLoyalty,sites:vSites,affiliates:vAffiliates}[cur])(); if(cur==='tools') initTools(); if(cur==='requests') loadRequests(); if(cur==='analytics') loadAnalytics(); if(cur==='intakes') loadIntakes(); if(cur==='prospects') loadProspects(); if(cur==='clientleads') loadClientLeads(); if(cur==='pipelines') loadPipelines(); if(cur==='reviews') loadReviews(); if(cur==='analytics') setTimeout(loadFunnel,300); if(cur==='everyone') loadEveryone(); if(cur==='loyalty') loadLoyalty(); if(cur==='affiliates') loadAffiliates(); }

/* ---- Sites: every page of the platform, one tap away ---- */
var SITES=[
  {g:'Your business', items:[

  ]},
  {g:'Rewards product', items:[

    ['📊','Loop owner dashboard','https://tbsol.net/rewards/owner/','What the business owner sees — members, tiers, bookings'],

    ['📷','Staff console','https://tbsol.net/rewards/staff/','Scan · punch · redeem'],
    ['🖨️','Poster (demo)','https://tbsol.net/rewards/poster/?c=demo','Print for the counter']

  {g:'Legal', items:[
    ['🔒','Privacy','https://tbsol.net/privacy/',''],
    ['📄','Terms','https://tbsol.net/terms/','']
  ]}
];
function vSites(){
  return '<div class="topbar"><div><h1>🌐 Sites</h1><p class="sub">Every page of your platform — tap to open, tap 📋 to copy the link</p></div></div>'
    + SITES.map(function(sec){
        return '<h2 style="margin:14px 0 8px">'+sec.g+'</h2>'

var TOWN_GEO={'West Chester':[39.9607,-75.6055],'Downingtown':[40.0065,-75.7033],'Coatesville':[39.9832,-75.8238],'Exton':[40.0290,-75.6208],'Phoenixville':[40.1304,-75.5149],'Kennett Square':[39.8468,-75.7116],'Malvern':[40.0362,-75.5138],'Paoli':[40.0418,-75.4763],'Oxford':[39.7854,-75.9788],'Honey Brook':[40.0946,-75.9113],'Parkesburg':[39.9587,-75.9194],'Thorndale':[39.9929,-75.7452]};
function nicheKeyword(n){
  n=(n||'').toLowerCase().trim();
  var map={'hvac':'hvac|heating|air','auto repair':'auto|garage|repair','car detailing':'detail|wash','hair salon':'salon|hair','cleaning service':'clean|maid','barbershop':'barber','landscaping':'landscap|lawn|garden','restaurant':'restaurant|grill|kitchen|pizza','contractor':'contract|construct|build','roofing':'roof','plumber':'plumb','painter':'paint','handyman':'handyman|repair','daycare':'daycare|child|learning','gym':'gym|fitness','towing':'tow'};
  if(map[n]) return map[n];
  var w=n.split(' ')[0].replace(/(ing|ers|er|s)$/,'');

function runFinderOSM(niche,town,showAll,el,go){

function vAnalytics(){
  if(!cloud) return '<div class="topbar"><div><h1>Analytics</h1></div></div><div class="empty">Log in with cloud sync to see your website analytics.</div>';
  return '<div class="topbar"><div><h1>Analytics</h1><p class="sub">Visits to tbsol.net — tracked in your own database</p></div></div><div id="anBody"><div class="empty">Loading…</div></div>';
}
function loadAnalytics(){
  if(!cloud) return;
  var since=new Date(Date.now()-30*864e5).toISOString();
  supa.from('pageviews').select('path,ref,w,ts').gte('ts',since).order('ts',{ascending:false}).limit(5000).then(function(r){
    var el=document.getElementById('anBody'); if(!el) return;
    if(r.error){ el.innerHTML='<div class="empty">Could not load — run hq/portal-analytics.sql in Supabase, then reload.</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ el.innerHTML='<div class="empty">No visits recorded yet. Tracking is live on tbsol.net — check back after some traffic (your own visits count too).</div>'; return; }
    var now=Date.now(), day=864e5;
    var today=0,week=0,mobile=0, byDay={}, byPath={}, byRef={};
    rows.forEach(function(v){
      var t=new Date(v.ts).getTime();
      if(now-t<day) today++;
      if(now-t<7*day) week++;
      if((v.w||999)<760) mobile++;
      var dkey=new Date(v.ts).toISOString().slice(0,10);
      byDay[dkey]=(byDay[dkey]||0)+1;
      var p=v.path||'/'; byPath[p]=(byPath[p]||0)+1;
      var ref=(v.ref||'').replace(/^https?:\/\//,'').split('/')[0]||'direct / typed in';
      if(ref.indexOf('tbsol.net')===-1) byRef[ref]=(byRef[ref]||0)+1;
    });
    var days=[]; for(var i=13;i>=0;i--){ var d=new Date(now-i*day).toISOString().slice(0,10); days.push([d.slice(5), byDay[d]||0]); }
    var max=Math.max.apply(null,days.map(function(x){return x[1];}).concat([1]));
    var bars=days.map(function(x){ return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:70%;max-width:26px;height:'+Math.max(3,Math.round(x[1]/max*110))+'px;border-radius:6px 6px 2px 2px;background:var(--grad)"></div><small style="color:var(--muted);font-size:9px">'+x[0]+'</small></div>'; }).join('');
    function topList(obj){ return Object.keys(obj).map(function(k){return [k,obj[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6)
      .map(function(x){return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%">'+esc(x[0])+'</span><b>'+x[1]+'</b></div>';}).join('')||'<p class="hint">Nothing yet</p>'; }
    el.innerHTML='<div class="grid stat-row">'
      +'<div class="card stat"><b>'+today+'</b><span>Visits today</span></div>'
      +'<div class="card stat"><b>'+week+'</b><span>Last 7 days</span></div>'
      +'<div class="card stat"><b>'+rows.length+'</b><span>Last 30 days</span></div>'
      +'<div class="card stat"><b>'+Math.round(mobile/rows.length*100)+'%</b><span>On phones</span></div></div>'
      +'<div class="section-h"><h2>Daily visits (14 days)</h2></div>'
      +'<div class="card"><div style="display:flex;align-items:flex-end;gap:4px;height:150px">'+bars+'</div></div>'
      +'<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:14px">'
      +'<div class="card"><h3 style="margin:0 0 8px;font-size:15px">Top pages</h3>'+topList(byPath)+'</div>'
      +'<div class="card"><h3 style="margin:0 0 8px;font-size:15px">Where visitors came from</h3>'+topList(byRef)+'</div></div>';
  });
}

function refreshInboxCounts(){

  Promise.all([
    supa.from('prospects').select('id',{count:'exact',head:true}).eq('status','New'),
    supa.from('intakes').select('id',{count:'exact',head:true}).eq('status','New'),

function popToast(title, sub, view){
  var d=document.createElement('div'); d.className='toast'; d.setAttribute('role','status'); d.setAttribute('aria-live','polite');
  d.innerHTML='<b>'+title+'</b><small>'+sub+'</small>';
  d.onclick=function(){ d.remove(); if(view){ cur=view; document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('on',b.dataset.view===view)}); render(); } };
  document.body.appendChild(d);
  setTimeout(function(){ if(d.parentNode) d.remove(); }, 12000);
}
var _popSeen = JSON.parse(localStorage.getItem('tb_pop_seen')||'{}');
function checkNew(){
  if(!cloud) return;
  var watch=[
    {table:'prospects', label:'🌱 New signup', view:'prospects', who:function(x){return x.email||''}},
    {table:'intakes',   label:'📥 New intake', view:'intakes',   who:function(x){return (x.business||x.name||'')+' — '+(x.email||'')}},
    {table:'tickets',   label:'🛟 New request', view:'requests', who:function(x){return (x.business||x.name||'')+(x.priority==='Urgent'?' (URGENT)':'')}}
  ];
  watch.forEach(function(w){
    supa.from(w.table).select('*').order('created_at',{ascending:false}).limit(3).then(function(r){
      if(r.error||!r.data||!r.data.length) return;
      var newest=r.data[0].created_at;
      var last=_popSeen[w.table];
      if(last===undefined){ _popSeen[w.table]=newest; localStorage.setItem('tb_pop_seen',JSON.stringify(_popSeen)); return; }
      r.data.filter(function(x){return x.created_at>last;}).reverse().forEach(function(x){
        popToast(w.label, esc(w.who(x))+' · tap to view', w.view);
      });
      if(newest>last){ _popSeen[w.table]=newest; localStorage.setItem('tb_pop_seen',JSON.stringify(_popSeen)); }
    });
  });
}

function fetchYT(n){
  var box=document.getElementById('vf_yt');
  box.innerHTML='<div class="section-h"><h2>Live YouTube results</h2></div><p class="hint">Loading…</p>';
  var after=new Date(Date.now()-30*864e5).toISOString();
  fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=viewCount&maxResults=10&publishedAfter='+encodeURIComponent(after)+'&q='+encodeURIComponent(n)+'&key='+YT_KEY)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){ box.innerHTML='<div class="section-h"><h2>Live YouTube results</h2></div><p class="hint">YouTube said: '+esc(d.error.message||'error')+'</p>'; return; }
      var ids=(d.items||[]).map(function(i){return i.id.videoId;}).filter(Boolean);
      if(!ids.length){ box.innerHTML='<div class="section-h"><h2>Live YouTube results</h2></div><p class="hint">No recent videos found for that niche — try a broader word.</p>'; return; }
      return fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id='+ids.join(',')+'&key='+YT_KEY)
        .then(function(r){return r.json();})
        .then(function(v){
          var rows=(v.items||[]).sort(function(a,b){return (+b.statistics.viewCount||0)-(+a.statistics.viewCount||0);});
          box.innerHTML='<div class="section-h"><h2>Most-viewed on YouTube (last 30 days)</h2></div>'
            + rows.map(function(x){
                var views=+x.statistics.viewCount||0;
                var vtxt=views>=1e6?(views/1e6).toFixed(1)+'M':views>=1e3?(views/1e3).toFixed(0)+'K':''+views;
                return '<a class="card spot" href="https://www.youtube.com/watch?v='+x.id+'" target="_blank" rel="noopener" style="display:flex;gap:12px;align-items:center;text-decoration:none;color:inherit;margin-bottom:10px">'
                  +'<img src="'+esc((x.snippet.thumbnails&&x.snippet.thumbnails.default&&x.snippet.thumbnails.default.url)||'')+'" style="width:88px;border-radius:10px" loading="lazy">'
                  +'<span style="flex:1"><b style="font-size:14px">'+esc(x.snippet.title)+'</b><br><small style="color:var(--muted)">'+esc(x.snippet.channelTitle)+' · '+vtxt+' views</small></span></a>';
              }).join('');
        });
    })
    .catch(function(){ box.innerHTML='<div class="section-h"><h2>Live YouTube results</h2></div><p class="hint">Could not reach YouTube right now.</p>'; });
}

    +'<div class="modal-actions"><button class="btn primary" id="au_go">'+(mode==='up'?'Create account':'Log in')+'</button></div>'
    +'<p class="authmsg" id="au_msg"></p>'
    +'<p style="margin-top:14px">'+(mode==='up'?'Already set up? <a href="#" id="au_swap">Log in</a>':'First time? <a href="#" id="au_swap">Create your account</a>')+'</p></div>';
  document.body.appendChild(w);
  document.getElementById('au_go').onclick=function(){ doAuth(mode); };
  document.getElementById('au_pass').addEventListener('keydown',function(e){ if(e.key==='Enter') doAuth(mode); });
  document.getElementById('au_swap').onclick=function(e){ e.preventDefault(); w.remove(); showLogin(mode==='up'?'in':'up'); };
}
function authMsg(t,ok){ var m=document.getElementById('au_msg'); if(m){ m.textContent=t; m.className='authmsg '+(ok?'ok':'err'); } }
function doAuth(mode){
  var email=val('au_email'), pass=val('au_pass');
  if(!email||!pass){ authMsg('Enter your email and password.'); return; }
  document.getElementById('au_go').textContent='Please wait…';
  var p = mode==='up' ? supa.auth.signUp({email:email,password:pass}) : supa.auth.signInWithPassword({email:email,password:pass});
  p.then(function(r){
    if(r.error){ authMsg(r.error.message); document.getElementById('au_go').textContent=(mode==='up'?'Create account':'Log in'); return; }
    if(mode==='up' && !r.data.session){ authMsg('Account made! Check your email to confirm, then log in.',true); document.getElementById('au_go').textContent='Create account'; return; }
    finishLogin(r.data.user||r.data.session.user);
  });
}
function finishLogin(u){
  user=u; cloud=true;
  var w=document.getElementById('authwrap'); if(w) w.remove();
  Promise.all([
    supa.from('leads').select('*').order('created_at',{ascending:false}),
    supa.from('clients').select('*').order('created_at',{ascending:false}),
    supa.from('tasks').select('*').order('created_at',{ascending:false}),
    supa.from('posts').select('*').order('created_at',{ascending:false})
  ]).then(function(rs){
    if(rs.slice(0,3).some(function(r){return r.error;})){
      alert('One-time setup needed: in Supabase, open SQL Editor and run the file hq/supabase-schema.sql, then reload this page.');
      state.leads=[];state.clients=[];state.tasks=[];state.posts=[]; startApp(); return;
    }
    state.leads=rs[0].data||[]; state.clients=rs[1].data||[]; state.tasks=rs[2].data||[]; state.posts=(rs[3]&&rs[3].data)||[];
    normalizeState();
    if(!state.leads.length && !state.clients.length && !state.tasks.length){ migrateOldKV(); }
    else { startApp(); }
  });
}
function normalizeState(){
  ['leads','clients','tasks','posts'].forEach(function(t){
    state[t]=state[t].map(function(o){ var c={}; for(var k in o){ c[k]=(o[k]===null)?'':o[k]; } if(t==='tasks') c.done=!!o.done; return c; });
  });
}
function migrateOldKV(){
  supa.from('kv').select('key,value').then(function(r){
    var kv={}; ((r&&r.data)||[]).forEach(function(row){ kv[row.key]=row.value||[]; });
    var l=kv.leads||[], c=kv.clients||[], t=kv.tasks||[];
    if(!l.length && !c.length && !t.length){ startApp(); return; }
    Promise.all([bulkUpsert('leads',l),bulkUpsert('clients',c),bulkUpsert('tasks',t)]).then(function(){
      state.leads=l; state.clients=c; state.tasks=t; startApp();
    });
  }, function(){ startApp(); });
}
function logout(){ if(supa) supa.auth.signOut(); location.reload(); }

/* ---------- boot ---------- */
function boot(){
  if(SUPA_URL && SUPA_KEY && window.supabase){
    supa=window.supabase.createClient(SUPA_URL, SUPA_KEY);
    supa.auth.getSession().then(function(r){
      if(r.data && r.data.session){ finishLogin(r.data.session.user); }
      else { showLogin('in'); }
    });
  } else {
    startApp(); // local-only mode
  }
}
boot();

/* Sentry-lite: report uncaught JS errors to the client_errors table */
window.addEventListener('error',function(e){try{
  fetch(SUPA_URL+'/rest/v1/client_errors',{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify({page:location.pathname,msg:String((e&&e.message)||'').slice(0,300),src:String((e&&e.filename)||'').slice(0,120),line:(e&&e.lineno)||0})}).catch(function(){});
}catch(_){}});
</script>
