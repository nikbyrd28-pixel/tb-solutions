<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Kitchen after remodeling">
  <!-- AFTER — renovated kitchen (high-fidelity render). Swap this file for the client's real 'after' photo (keep the filename after.svg → or point the <img> to after.jpg). -->
  <defs>
    <linearGradient id="aAmb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbfaf6"/><stop offset=".62" stop-color="#f1eee6"/><stop offset="1" stop-color="#e6e2d8"/></linearGradient>
    <linearGradient id="aWall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efece4"/><stop offset="1" stop-color="#e2ddd2"/></linearGradient>
    <linearGradient id="aFloor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e2cba7"/><stop offset="1" stop-color="#c7ac83"/></linearGradient>
    <linearGradient id="aCounter" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#faf8f3"/><stop offset="1" stop-color="#e7e2d7"/></linearGradient>
    <linearGradient id="aCabU" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6ece6"/><stop offset="1" stop-color="#d2ddd4"/></linearGradient>
    <linearGradient id="aCabL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c3d0c6"/><stop offset="1" stop-color="#a7b8ac"/></linearGradient>
    <linearGradient id="aSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eaf6f4"/><stop offset="1" stop-color="#c9e6e2"/></linearGradient>
    <linearGradient id="aBrass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0d49a"/><stop offset=".5" stop-color="#cfa35a"/><stop offset="1" stop-color="#a87e3f"/></linearGradient>
    <radialGradient id="aGlow" cx="50%" cy="30%" r="65%"><stop offset="0" stop-color="#ffe6ad" stop-opacity=".75"/><stop offset="1" stop-color="#ffe6ad" stop-opacity="0"/></radialGradient>
    <radialGradient id="aVig" cx="50%" cy="42%" r="72%"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset=".78" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#2a2418" stop-opacity=".28"/></radialGradient>
    <linearGradient id="aShaft" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7e0" stop-opacity=".5"/><stop offset="1" stop-color="#fff7e0" stop-opacity="0"/></linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#aAmb)"/>
  <!-- ceiling -->
  <rect width="1600" height="70" fill="#f4f1ea"/><rect width="1600" height="70" fill="#000" opacity=".05"/>
  <!-- back wall -->
  <rect y="70" width="1600" height="722" fill="url(#aWall)"/>
  <!-- perspective floor -->
  <polygon points="0,792 1600,792 1600,1000 0,1000" fill="url(#aFloor)"/>
  <g stroke="#b7935f" stroke-width="2.5" opacity=".55">
    <path d="M800 792 800 1000"/><path d="M800 792 300 1000"/><path d="M800 792 1300 1000"/><path d="M800 792 -260 1000"/><path d="M800 792 1860 1000"/>
    <path d="M0 858H1600M0 936H1600"/>
  </g>
  <rect y="792" width="1600" height="120" fill="#fff" opacity=".07"/>
  <!-- backsplash tiles -->
  <rect x="0" y="470" width="1600" height="92" fill="#eef1eb"/>
  <g stroke="#dbe2da" stroke-width="2"><path d="M0 516H1600"/><path d="M110 470v92M240 470v92M370 470v92M500 470v92M1090 470v92M1220 470v92M1350 470v92M1480 470v92"/></g>
  <rect x="0" y="470" width="1600" height="20" fill="#fff" opacity=".35"/>
  <!-- window -->
  <rect x="612" y="120" width="376" height="442" rx="4" fill="#33433d"/>
  <rect x="628" y="136" width="344" height="410" fill="url(#aSky)"/>
  <g fill="#a6c9a1" opacity=".92"><circle cx="700" cy="470" r="46"/><circle cx="770" cy="500" r="34"/><circle cx="905" cy="486" r="40"/><circle cx="850" cy="520" r="26"/></g>
  <path d="M800 136V546M628 341H972" stroke="#33433d" stroke-width="14"/>
  <rect x="628" y="136" width="344" height="120" fill="#fff" opacity=".22"/>
  <!-- light shaft from window onto counter -->
  <polygon points="640,556 980,556 1120,760 500,760" fill="url(#aShaft)" opacity=".55"/>
  <!-- upper cabinets with under-cabinet shadow + LED -->
  <g>
    <rect x="40" y="150" width="250" height="196" rx="6" fill="url(#aCabU)"/><rect x="290" y="150" width="250" height="196" rx="6" fill="url(#aCabU)"/>
    <rect x="1060" y="150" width="250" height="196" rx="6" fill="url(#aCabU)"/><rect x="1310" y="150" width="250" height="196" rx="6" fill="url(#aCabU)"/>
    <g fill="none" stroke="#c2cec4" stroke-width="2.5"><rect x="58" y="168" width="214" height="160" rx="4"/><rect x="308" y="168" width="214" height="160" rx="4"/><rect x="1078" y="168" width="214" height="160" rx="4"/><rect x="1328" y="168" width="214" height="160" rx="4"/></g>
  </g>
  <g fill="url(#aBrass)"><rect x="262" y="250" width="9" height="66" rx="4.5"/><rect x="309" y="250" width="9" height="66" rx="4.5"/><rect x="1282" y="250" width="9" height="66" rx="4.5"/><rect x="1329" y="250" width="9" height="66" rx="4.5"/></g>
  <rect x="40" y="346" width="500" height="30" fill="#000" opacity=".12"/><rect x="1060" y="346" width="500" height="30" fill="#000" opacity=".12"/>
  <rect x="46" y="348" width="488" height="5" fill="#fff6dc" opacity=".85"/><rect x="1066" y="348" width="488" height="5" fill="#fff6dc" opacity=".85"/>
  <!-- countertop (slab top face + front edge) -->
  <rect x="0" y="556" width="1600" height="20" fill="url(#aCounter)"/>
  <rect x="0" y="576" width="1600" height="34" fill="#efeadf"/><rect x="0" y="576" width="1600" height="6" fill="#fff" opacity=".6"/>
  <g stroke="#d7d0c2" stroke-width="2" opacity=".7" fill="none"><path d="M120 566q70 14 150 4t180 6"/><path d="M900 570q90 -12 190 6t180 -2"/><path d="M1330 566q50 12 130 2"/></g>
  <!-- base cabinets -->
  <rect x="0" y="610" width="1600" height="200" fill="url(#aCabL)"/>
  <g fill="none" stroke="#93a597" stroke-width="3"><rect x="26" y="628" width="230" height="164" rx="5"/><rect x="286" y="628" width="230" height="164" rx="5"/><rect x="820" y="628" width="230" height="164" rx="5"/><rect x="1080" y="628" width="230" height="164" rx="5"/><rect x="1340" y="628" width="230" height="164" rx="5"/></g>
  <g fill="url(#aBrass)"><rect x="150" y="700" width="58" height="8" rx="4"/><rect x="410" y="700" width="58" height="8" rx="4"/><rect x="944" y="700" width="58" height="8" rx="4"/><rect x="1204" y="700" width="58" height="8" rx="4"/></g>
  <rect x="0" y="792" width="1600" height="20" fill="#000" opacity=".16"/>
  <!-- sink + modern faucet (under window) -->
  <rect x="700" y="576" width="200" height="30" rx="6" fill="#e4ded2"/>
  <path d="M792 576v-52a26 26 0 0 1 52 0" fill="none" stroke="url(#aBrass)" stroke-width="10" stroke-linecap="round"/>
  <!-- potted plant -->
  <g><path d="M1452 556c-34-8-52-46-34-80 30 10 46 46 34 80z" fill="#7fae79"/><path d="M1452 556c34-8 52-46 34-80-30 10-46 46-34 80z" fill="#6f9e6a"/><path d="M1452 558c0-46 0-78 0-108 20 26 20 76 0 108z" fill="#84b47d"/><rect x="1420" y="556" width="66" height="54" rx="9" fill="#cf9a63"/><rect x="1420" y="556" width="66" height="12" fill="#000" opacity=".08"/></g>
  <!-- pendant lights -->
  <g stroke="#b98f4f" stroke-width="4"><path d="M560 70V300"/><path d="M1040 70V300"/></g>
  <path d="M520 300h80l-18 50h-44z" fill="url(#aBrass)"/><path d="M1000 300h80l-18 50h-44z" fill="url(#aBrass)"/>
  <ellipse cx="560" cy="352" rx="18" ry="6" fill="#fff3cf"/><ellipse cx="1040" cy="352" rx="18" ry="6" fill="#fff3cf"/>
  <circle cx="560" cy="360" r="70" fill="url(#aGlow)"/><circle cx="1040" cy="360" r="70" fill="url(#aGlow)"/>
  <!-- photographic vignette -->
  <rect width="1600" height="1000" fill="url(#aVig)"/>
</svg>
