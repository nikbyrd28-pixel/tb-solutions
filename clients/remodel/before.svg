<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Kitchen before remodeling">
  <!-- BEFORE — dated, dim kitchen (high-fidelity render). Swap this file for the client's real 'before' photo (keep the filename before.svg → or point the <img> to before.jpg). -->
  <defs>
    <linearGradient id="bAmb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cabda6"/><stop offset=".62" stop-color="#b9aa90"/><stop offset="1" stop-color="#a29176"/></linearGradient>
    <linearGradient id="bWall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c1b39c"/><stop offset="1" stop-color="#ab9c83"/></linearGradient>
    <linearGradient id="bFloor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#94836a"/><stop offset="1" stop-color="#7c6b52"/></linearGradient>
    <linearGradient id="bCounter" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#948a79"/><stop offset="1" stop-color="#7d7364"/></linearGradient>
    <linearGradient id="bCabU" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6f5333"/><stop offset="1" stop-color="#573f24"/></linearGradient>
    <linearGradient id="bCabL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5e4525"/><stop offset="1" stop-color="#4a3419"/></linearGradient>
    <linearGradient id="bSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b6c0bd"/><stop offset="1" stop-color="#96a09c"/></linearGradient>
    <radialGradient id="bVig" cx="50%" cy="40%" r="72%"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset=".62" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#241c12" stop-opacity=".46"/></radialGradient>
    <linearGradient id="bDim" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity=".06"/><stop offset="1" stop-color="#2c2114" stop-opacity=".34"/></linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bAmb)"/>
  <rect width="1600" height="70" fill="#a89a80"/><rect width="1600" height="70" fill="#000" opacity=".12"/>
  <rect y="70" width="1600" height="722" fill="url(#bWall)"/>
  <!-- perspective floor (dull) -->
  <polygon points="0,792 1600,792 1600,1000 0,1000" fill="url(#bFloor)"/>
  <g stroke="#5f4f38" stroke-width="2.5" opacity=".5">
    <path d="M800 792 800 1000"/><path d="M800 792 300 1000"/><path d="M800 792 1300 1000"/><path d="M800 792 -260 1000"/><path d="M800 792 1860 1000"/>
    <path d="M0 858H1600M0 936H1600"/>
  </g>
  <!-- old backsplash -->
  <rect x="0" y="470" width="1600" height="92" fill="#a89877"/>
  <g stroke="#8f7f5f" stroke-width="2" opacity=".6"><path d="M0 516H1600"/><path d="M110 470v92M240 470v92M370 470v92M500 470v92M1090 470v92M1220 470v92M1350 470v92M1480 470v92"/></g>
  <!-- window (dated frame, dull glass) -->
  <rect x="612" y="120" width="376" height="442" rx="4" fill="#6d6150"/>
  <rect x="628" y="136" width="344" height="410" fill="url(#bSky)"/>
  <path d="M800 136V546M628 341H972" stroke="#6d6150" stroke-width="14"/>
  <!-- upper cabinets (dark oak) -->
  <g>
    <rect x="40" y="150" width="250" height="196" rx="4" fill="url(#bCabU)"/><rect x="290" y="150" width="250" height="196" rx="4" fill="url(#bCabU)"/>
    <rect x="1060" y="150" width="250" height="196" rx="4" fill="url(#bCabU)"/><rect x="1310" y="150" width="250" height="196" rx="4" fill="url(#bCabU)"/>
    <g fill="none" stroke="#4a3521" stroke-width="3"><rect x="58" y="168" width="214" height="160" rx="3"/><rect x="308" y="168" width="214" height="160" rx="3"/><rect x="1078" y="168" width="214" height="160" rx="3"/><rect x="1328" y="168" width="214" height="160" rx="3"/></g>
  </g>
  <g fill="#3c2b18"><circle cx="266" cy="330" r="8"/><circle cx="314" cy="330" r="8"/><circle cx="1286" cy="330" r="8"/><circle cx="1334" cy="330" r="8"/></g>
  <rect x="40" y="346" width="500" height="26" fill="#000" opacity=".22"/><rect x="1060" y="346" width="500" height="26" fill="#000" opacity=".22"/>
  <!-- laminate counter -->
  <rect x="0" y="556" width="1600" height="20" fill="url(#bCounter)"/>
  <rect x="0" y="576" width="1600" height="34" fill="#867c6b"/><rect x="0" y="576" width="1600" height="5" fill="#000" opacity=".18"/>
  <!-- base cabinets -->
  <rect x="0" y="610" width="1600" height="200" fill="url(#bCabL)"/>
  <g fill="none" stroke="#3c2b18" stroke-width="3"><rect x="26" y="628" width="230" height="164" rx="3"/><rect x="286" y="628" width="230" height="164" rx="3"/><rect x="820" y="628" width="230" height="164" rx="3"/><rect x="1080" y="628" width="230" height="164" rx="3"/><rect x="1340" y="628" width="230" height="164" rx="3"/></g>
  <g fill="#2f2113"><rect x="150" y="700" width="52" height="8" rx="4"/><rect x="410" y="700" width="52" height="8" rx="4"/><rect x="944" y="700" width="52" height="8" rx="4"/><rect x="1204" y="700" width="52" height="8" rx="4"/></g>
  <rect x="0" y="792" width="1600" height="20" fill="#000" opacity=".2"/>
  <!-- old faucet -->
  <path d="M792 576v-44a22 22 0 0 1 44 0" fill="none" stroke="#8f8676" stroke-width="9" stroke-linecap="round"/>
  <!-- worn wall patch + stain -->
  <rect x="120" y="470" width="300" height="70" fill="#8a7a5e" opacity=".4"/>
  <ellipse cx="1300" cy="740" rx="120" ry="26" fill="#000" opacity=".12"/>
  <!-- dim pendant fixtures -->
  <g stroke="#5a4e3b" stroke-width="4"><path d="M560 70V300"/><path d="M1040 70V300"/></g>
  <path d="M524 300h72l-16 46h-40z" fill="#4d4229"/><path d="M1004 300h72l-16 46h-40z" fill="#4d4229"/>
  <rect width="1600" height="1000" fill="url(#bDim)"/>
  <rect width="1600" height="1000" fill="url(#bVig)"/>
</svg>
