<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Leave a review — TB Solutions</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%2305070f'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='30'%3E%E2%AD%90%3C/text%3E%3C/svg%3E" />
<style>
  :root{--text:#eef1ff;--muted:#96a0c4;--line:rgba(150,190,255,.25);--cyan:#5df2e0;--gold:#f5c04a}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,"Segoe UI",Arial,sans-serif;color:var(--text);line-height:1.6;min-height:100vh;background:radial-gradient(circle at 20% -10%,rgba(93,242,224,.10),transparent 40%),linear-gradient(180deg,#070a12,#03040a);display:flex;align-items:flex-start;justify-content:center;padding:34px 16px}
  .wrap{width:min(520px,100%)}
  .brand{font-weight:900;font-size:18px;margin-bottom:20px}
  .brand span{color:var(--cyan)}
  h1{font-size:clamp(24px,5.5vw,32px);margin:0 0 8px}
  .lead{color:var(--muted);margin:0 0 22px;font-size:15px}
  .card{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:18px;padding:24px}
  label{display:block;margin:14px 0 0;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase}
  input,textarea{width:100%;background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--text);font:inherit;font-size:15px;margin-top:6px}
  textarea{min-height:100px;resize:vertical}
  input:focus,textarea:focus{outline:none;border-color:var(--cyan)}
  .stars{display:flex;gap:6px;margin-top:8px;font-size:34px;cursor:pointer;user-select:none}
  .stars span{filter:grayscale(1);opacity:.45;transition:all .12s}
  .stars span.on{filter:none;opacity:1;transform:scale(1.08)}
  button{width:100%;margin-top:20px;border:0;background:linear-gradient(135deg,var(--cyan),#6f9dff);color:#03040a;border-radius:999px;padding:15px;font:inherit;font-weight:900;font-size:15px;cursor:pointer}
  button:disabled{opacity:.6}
  .ok{display:none;text-align:center;padding:24px 6px}
  .ok.show{display:block}
  .fine{color:var(--muted);font-size:12px;margin-top:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">TB <span>Solutions</span></div>
  <h1>How'd we do? ⭐</h1>
  <p class="lead">Two minutes, huge help. Your review may be shown on our website.</p>
  <div class="card">
    <form id="f">
      <label>Rating</label>
      <div class="stars" id="stars">
        <span data-v="1">⭐</span><span data-v="2">⭐</span><span data-v="3">⭐</span><span data-v="4">⭐</span><span data-v="5">⭐</span>
      </div>
      <label>Your name</label><input name="name" required autocomplete="name">
      <label>Your business</label><input name="business" id="biz">
      <label>What was it like working with us?</label><textarea name="text" required placeholder="What we built, what changed for your business..."></textarea>
      <button type="submit" id="btn">Send review</button>
      <p class="fine">By submitting you agree it may appear on tbsol.net. <a href="/privacy/" style="color:var(--muted)">Privacy</a></p>
    </form>
    <div class="ok" id="ok">
      <div style="font-size:44px">🙏</div>
      <h1 style="font-size:24px">Thank you!</h1>
      <p class="lead">That means a lot. — Nick</p>
    </div>
  </div>
</div>
<script>
var SUPA_URL='https://qgbjiqdwzgkjkmqyjsmc.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmppcWR3emdramttcXlqc21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzc1NTEsImV4cCI6MjA5OTk1MzU1MX0.Naocw-B0B6Z7CLg197yxLezd58a6f5XoMLEiea5b0Ro';
var rating=5;
var q=new URLSearchParams(location.search);
if(q.get('b')) document.getElementById('biz').value=q.get('b');
function paint(){ document.querySelectorAll('#stars span').forEach(function(s){ s.classList.toggle('on', Number(s.dataset.v)<=rating); }); }
document.querySelectorAll('#stars span').forEach(function(s){ s.onclick=function(){ rating=Number(s.dataset.v); paint(); }; });
paint();
document.getElementById('f').addEventListener('submit',function(e){
  e.preventDefault();
  var f=e.target, btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Sending…';
  var d={}; new FormData(f).forEach(function(v,k){ d[k]=v; });
  fetch(SUPA_URL+'/rest/v1/reviews',{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify({name:d.name||'',business:d.business||'',rating:rating,text:d.text||'',source:'review page'})})
  .then(function(){ f.style.display='none'; document.getElementById('ok').classList.add('show'); })
  .catch(function(){ btn.disabled=false; btn.textContent='Send review'; alert('Could not send — try again.'); });
});
window.addEventListener('error',function(e){try{
  fetch(SUPA_URL+'/rest/v1/client_errors',{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify({page:location.pathname,msg:String((e&&e.message)||'').slice(0,300),src:String((e&&e.filename)||'').slice(0,120),line:(e&&e.lineno)||0})}).catch(function(){});
}catch(_){}});
</script>
</body>
</html>
